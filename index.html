/* ── DASHBOARD ── */
function Dashboard({products,orders,expenses,taxis,shipments}){
  const totalRev=orders.reduce((s,o)=>s+Number(o.total),0);
  const totalExp=expenses.reduce((s,e)=>s+Number(e.amount),0)+taxis.reduce((s,r)=>s+Number(r.amount),0)+shipments.reduce((s,s2)=>s+Number(s2.amount||0),0);
  const totalDisc=orders.reduce((s,o)=>s+Number(o.discount||0),0);
  const netProfit=totalRev-totalExp-totalDisc;
  const prodProfit=orders.reduce((s,o)=>s+(o.items||[]).reduce((ss,i)=>ss+(i.sellPrice-i.buyPrice)*i.qty,0),0);
  const taxiTotal=taxis.reduce((s,r)=>s+Number(r.amount),0);
  const buyTotal=shipments.filter(s=>s.type==="وجبة_شراء").reduce((s,ss)=>s+Number(ss.amount),0);
  const seaLandTotal=shipments.filter(s=>s.type!=="وجبة_شراء").reduce((s,ss)=>s+Number(ss.amount),0);
  const lowStock=products.filter(p=>p.stock<=1);
  const avgPerOrder=orders.length?Math.round(netProfit/orders.length):0;

  return e("div",{style:{display:"flex",flexDirection:"column",gap:16}},
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}},
      e("h1",{style:{fontSize:26,fontWeight:900,color:"#f1f5f9"}},"لوحة التحكم"),
      e("button",{onClick:()=>window.print(),style:S.btn("rgba(255,255,255,0.08)","#94a3b8")},"🖨️ طباعة")

    lowStock.length>0&&e("div",{style:{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,color:"#f87171"}},
      e("span",null,"⚠️"),

      )

    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}},
      e(StatCard,{label:"إجمالي الإيرادات",value:totalRev,sub:"مجموع الطلبيات",icon:"💰",color:"#10b981"}),
      e(StatCard,{label:"إجمالي المصروفات",value:totalExp,sub:"جميع المصروفات",icon:"🧾",color:"#ef4444"}),

      e(StatCard,{label:"عدد الطلبيات",value:orders.length,icon:"📋"}),

function Orders({products,orders,setOrders,settings,sync,db}){
  const[open,setOpen]=useState(false);
  const[form,setForm]=useState({province:"",channel:"أهل والبيت",discount:"0",date:toDay(),notes:""});
  const[cart,setCart]=useState([]);
  const[selP,setSelP]=useState("");
  const[qty,setQty]=useState(1);
  const[saving,setSaving]=useState(false);
  const[search,setSearch]=useState("");

  const allProvinces=(settings.delivery_zones||[]).flatMap(z=>z.cities);
  const deliveryCost=(()=>{for(const z of(settings.delivery_zones||[]))if(z.cities.includes(form.province))return z.price;return 0;})();
  const subtotal=cart.reduce((s,i)=>s+i.sellPrice*i.qty,0);
  const buyTotal=cart.reduce((s,i)=>s+i.buyPrice*i.qty,0);
  const profit=subtotal-buyTotal-(Number(form.discount)||0);

/* ── REPORTS ── */
function Reports({products,orders,expenses,taxis,shipments}){
  const totalRev=orders.reduce((s,o)=>s+Number(o.total),0);
  const totalExp=expenses.reduce((s,e)=>s+Number(e.amount),0);
  const totalDisc=orders.reduce((s,o)=>s+Number(o.discount||0),0);
  const netProfit=totalRev-totalExp-totalDisc;
  const prodProfit=orders.reduce((s,o)=>s+(o.items||[]).reduce((ss,i)=>ss+(i.sellPrice-i.buyPrice)*i.qty,0),0);
  const avgPerOrder=orders.length?Math.round(netProfit/orders.length):0;
  const seasonData={ربيع:0,صيف:0,خريف:0,شتاء:0};
  orders.forEach(o=>{seasonData[getSeason(o.date||toDay())]+=Number(o.total);});
  const strongSeason=Object.entries(seasonData).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const weakSeason=Object.entries(seasonData).sort((a,b)=>a[1]-b[1])[0]?.[0];
  const topProducts=products.map(p=>({...p,soldQty:orders.reduce((s,o)=>s+(o.items||[]).filter(i=>i.productId===p.id).reduce((ss,i)=>ss+i.qty,0),0),revenue:orders.reduce((s,o)=>s+(o.items||[]).filter(i=>i.productId===p.id).reduce((ss,i)=>ss+i.sellPrice*i.qty,0),0),profit:orders.reduce((s,o)=>s+(o.items||[]).filter(i=>i.productId===p.id).reduce((ss,i)=>ss+(i.sellPrice-i.buyPrice)*i.qty,0),0)})).sort((a,b)=>b.revenue-a.revenue);
  const provData={};orders.forEach(o=>{if(!provData[o.province])provData[o.province]={province:o.province,orders:0,revenue:0};provData[o.province].orders++;provData[o.province].revenue+=Number(o.total);});
  const provArr=Object.values(provData).sort((a,b)=>b.revenue-a.revenue);
  const SC={شتاء:{icon:"❄️",color:"#3b82f6"},ربيع:{icon:"🌱",color:"#22c55e"},صيف:{icon:"☀️",color:"#f59e0b"},خريف:{icon:"🍂",color:"#f97316"}};

  return e("div",{style:{display:"flex",flexDirection:"column",gap:16}},
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}},
      e("h1",{style:{fontSize:26,fontWeight:900,color:"#f1f5f9"}},"التقارير المالية"),
      e("button",{onClick:()=>window.print(),style:S.btn("rgba(255,255,255,0.08)","#94a3b8")},"🖨️ طباعة")
    ),
    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}},
      e(StatCard,{label:"إجمالي الإيرادات",value:totalRev,icon:"💰",color:"#10b981"}),
      e(StatCard,{label:"صافي الربح",value:netProfit,icon:"💵",color:netProfit>=0?"#3b82f6":"#ef4444"}),
      e(StatCard,{label:"ربح الموديلات",value:prodProfit,icon:"📈",color:"#22c55e"}),
      e(StatCard,{label:"متوسط الربح/عملية",value:avgPerOrder,icon:"📊",color:"#10b981"}),
      e(StatCard,{label:"قيمة المخزون",value:products.reduce((s,p)=>s+p.buy_price*p.stock,0),icon:"📦"}),
      e(StatCard,{label:"إجمالي المصروفات",value:totalExp,icon:"🧾",color:"#ef4444"}),
      e(StatCard,{label:"التخفيضات",value:totalDisc,icon:"🏷️",color:"#f59e0b"}),
      e(StatCard,{label:"عدد العمليات",value:orders.length,icon:"📋"})

    e("div",{style:S.card()},
      e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}},
        e("p",{style:{fontWeight:700,fontSize:14,color:"#f1f5f9"}},"التحليل الموسمي المتقدم"),
        strongSeason&&e("span",{style:{background:"rgba(34,197,94,0.15)",color:"#22c55e",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700}},`🌟 أقوى موسم: ${strongSeason}`),
        weakSeason&&weakSeason!==strongSeason&&e("span",{style:{background:"rgba(239,68,68,0.15)",color:"#f87171",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700}},`⚠️ أضعف موسم: ${weakSeason}`)
      ),

/* ── BACKUP ── */
function Backup({products,orders,expenses,taxis,shipments,settings,sync,db,load}){
  const[msg,setMsg]=useState("");
  const exportJSON=()=>{
    const data={products,orders,expenses,taxis,shipments,settings,exportDate:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`pos-backup-${toDay()}.json`;a.click();
    setMsg("✅ تم تحميل ملف النسخة الاحتياطية!");
  };
  const importJSON=async ev=>{
    const file=ev.target.files?.[0];if(!file)return;ev.target.value="";
    const reader=new FileReader();
    reader.onload=async e=>{
      try{
        const d=JSON.parse(e.target.result);
        if(!confirm("هل تريد استيراد البيانات؟"))return;
        await sync(async()=>{
          if(d.products?.length)await db.add("products",d.products.map(p=>({name:p.name,category:p.category,season:p.season,buy_price:p.buy_price||p.buyPrice||0,sell_price:p.sell_price||p.sellPrice||0,stock:p.stock||0,added_date:p.added_date||todayDisp()})));
          if(d.expenses?.length)await db.add("expenses",d.expenses.map(ex=>({category:ex.category,description:ex.description,amount:ex.amount,date:ex.date,notes:ex.notes})));
        });
        await load();setMsg("✅ تم الاستيراد بنجاح!");
      }catch(err){setMsg("❌ ملف غير صالح: "+err.message);}
    };
    reader.readAsText(file);
  };
  return e("div",{style:{display:"flex",flexDirection:"column",gap:16,maxWidth:580,margin:"0 auto"}},
    e("h1",{style:{fontSize:26,fontWeight:900,color:"#f1f5f9"}},"💾 النسخ الاحتياطي"),
    e("div",{style:{background:"linear-gradient(135deg,#1a73e8,#0f4c96)",borderRadius:18,padding:22,color:"#fff"}},
      e("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:14}},
        e("div",{style:{width:48,height:48,background:"rgba(255,255,255,0.2)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}},"☁️"),
        e("div",null,e("p",{style:{fontWeight:800,fontSize:16}},"Supabase Cloud"),e("p",{style:{fontSize:12,opacity:0.8}},"بياناتك محفوظة تلقائياً على السحابة"))
      ),
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}},
        ...[["المنتجات",products.length],["الطلبات",orders.length],["المصروفات",expenses.length]].map(([label,val])=>e("div",{key:label,style:{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"10px 12px",textAlign:"center"}},e("p",{style:{fontSize:22,fontWeight:900}},val),e("p",{style:{fontSize:11,opacity:0.75}},label)))
      ),
      e("button",{onClick:()=>{setMsg("🔄 جاري التحديث...");load().then(()=>setMsg("✅ تم تحديث البيانات!"));},style:{width:"100%",padding:11,background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:10,color:"#fff",cursor:"pointer",fontFamily:"Cairo,sans-serif",fontWeight:700,fontSize:13}},"🔄 تحديث البيانات من السحابة")
    ),
    e("div",{style:S.card()},
      e("p",{style:{fontWeight:700,fontSize:14,marginBottom:4,color:"#f1f5f9"}},"🖥️ نسخ احتياطي محلي (JSON)"),
      e("p",{style:{fontSize:12,color:"#64748b",marginBottom:14}},"احفظ نسخة على جهازك أو استعد من نسخة سابقة."),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
        e("button",{onClick:exportJSON,style:{padding:18,borderRadius:12,border:"2px solid rgba(16,185,129,0.3)",background:"rgba(16,185,129,0.05)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6}},
          e("span",{style:{fontSize:26}},"⬇️"),
          e("p",{style:{fontWeight:700,color:"#10b981",fontFamily:"Cairo,sans-serif",fontSize:13}},"تحميل JSON"),
          e("p",{style:{fontSize:11,color:"#64748b",fontFamily:"Cairo,sans-serif"}},"حفظ على الجهاز")
        ),
        e("label",{style:{padding:18,borderRadius:12,border:"2px solid rgba(245,158,11,0.3)",background:"rgba(245,158,11,0.05)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6}},
          e("span",{style:{fontSize:26}},"⬆️"),
          e("p",{style:{fontWeight:700,color:"#f59e0b",fontFamily:"Cairo,sans-serif",fontSize:13}},"استيراد JSON"),
          e("p",{style:{fontSize:11,color:"#64748b",fontFamily:"Cairo,sans-serif"}},"استعادة البيانات"),
          e("input",{type:"file",accept:".json",onChange:importJSON,style:{display:"none"}})
        )
      ),
      msg&&e("div",{style:{padding:"9px 12px",borderRadius:8,background:"rgba(16,185,129,0.1)",color:"#10b981",fontSize:13,fontWeight:700,textAlign:"center"}},msg)
    )
  );
}

/* ── MAIN APP ── */
function App(){
  const[lang,setLangS]=useState(()=>localStorage.getItem("sb_lang")||"ar");
  const[theme,setTheme]=useState(()=>localStorage.getItem("sb_theme")||"dark");
  const setLang=l=>{setLangS(l);localStorage.setItem("sb_lang",l);};
  const toggleTheme=()=>setTheme(t=>{const n=t==="dark"?"light":"dark";localStorage.setItem("sb_theme",n);return n;});
  const[authed,setAuthed]=useState(()=>!!localStorage.getItem("sb_auth"));
  const[page,setPage]=useState("dashboard");
  const[loading,setLoading]=useState(true);
  const[syncSt,setSyncSt]=useState("synced");
  const[dbErr,setDbErr]=useState(null);
  const[mobileOpen,setMobileOpen]=useState(false);
  const[products,setProducts]=useState([]);
  const[orders,setOrders]=useState([]);
  const[expenses,setExpenses]=useState([]);
  const[taxis,setTaxis]=useState([]);
  const[shipments,setShipments]=useState([]);
  const[settings,setSettings]=useState(DEF);

  const load=useCallback(async()=>{
    try{
      setLoading(true);setDbErr(null);
      const[p,o,ex,tx,sh,st]=await Promise.all([db.list("products"),db.list("orders"),db.list("expenses"),db.list("taxi_rides"),db.list("shipments"),db.list("settings","id=eq.1")]);
      setProducts(p||[]);setOrders((o||[]).map(x=>({...x,items:x.items||[]})));setExpenses(ex||[]);setTaxis(tx||[]);setShipments(sh||[]);
      if(st?.length)setSettings(st[0]);else{await db.ups("settings",{id:1,...DEF});setSettings(DEF);}
    }catch(err){setDbErr(err.message);}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{if(authed)load();},[authed]);

  const sync=async fn=>{
    setSyncSt("saving");
    try{await fn();setSyncSt("synced");}
    catch(err){setSyncSt("error");alert("خطأ: "+err.message);}
  };

  if(!authed)return e(Login,{onLogin:()=>{localStorage.setItem("sb_auth","1");setAuthed(true);}});

  const p={products,orders,expenses,taxis,shipments,settings,setProducts,setOrders,setExpenses,setTaxis,setShipments,setSettings,sync,db,load};

  return e("div",{dir:lang==="ar"?"rtl":"ltr",style:{display:"flex",minHeight:"100vh",background:"#0f172a",fontFamily:"Cairo,sans-serif"}},
    e(Sidebar,{page,setPage,lowStock:products.filter(x=>x.stock<=1).length,syncSt,onLogout:()=>{localStorage.removeItem("sb_auth");setAuthed(false);},lang,setLang,theme,toggleTheme,mobileOpen,setMobileOpen}),
    e("div",{style:{flex:1,display:"flex",flexDirection:"column",minWidth:0}},
      // Mobile header
      window.innerWidth<=768&&e("div",{style:{background:"#0b1120",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,0.06)",position:"sticky",top:0,zIndex:100}},
        e("div",{style:{display:"flex",alignItems:"center",gap:8}},
          e("div",{style:{width:30,height:30,borderRadius:8,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}},"🌾"),
          e("span",{style:{fontWeight:800,color:"#fff",fontSize:14}},"pos-sonbola")
        ),
        e("button",{onClick:()=>setMobileOpen(true),style:{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:18,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}},"☰")
      ),
      dbErr&&e("div",{style:{background:"rgba(239,68,68,0.1)",borderBottom:"1px solid rgba(239,68,68,0.2)",padding:"10px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
        e("span",{style:{color:"#f87171",fontSize:13}},`⚠️ ${dbErr}`),
        e("button",{onClick:load,style:S.btn("#ef4444")},"إعادة المحاولة")
      ),
      e("main",{style:{flex:1,padding:16,overflowY:"auto"}},
        loading?e("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:60,gap:12}},
          e("div",{className:"spin",style:{width:40,height:40,border:"3px solid rgba(255,255,255,0.1)",borderTopColor:"#10b981",borderRadius:"50%"}}),
          e("p",{style:{color:"#64748b",fontSize:13}},"جاري التحميل...")
        ):e("div",{className:"fadeIn"},
          page==="dashboard"&&e(Dashboard,p),
          page==="orders"&&e(Orders,p),
          page==="products"&&e(Products,p),
          page==="expenses"&&e(Expenses,p),
          page==="taxi"&&e(Taxi,p),
          page==="shipment"&&e(Shipment,p),
          page==="reports"&&e(Reports,p),
          page==="settings"&&e(Settings,p),
          page==="backup"&&e(Backup,p)
        )
      )
    )
  );
}

render(e(App,null), document.getElementById("app"));
</script>
