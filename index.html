<html lang="ar" dir="rtl" class="dark">
<head>
<meta charset="UTF-8"/>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Cairo','sans-serif']}}}}

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.spin{animation:spin .8s linear infinite}
.fi{animation:fi .2s ease}
/* Dark theme vars */
.dark{
  --bg:hsl(222,47%,8%);--fg:hsl(210,20%,94%);--card:hsl(222,40%,11%);
  --border:hsl(220,35%,18%);--muted:hsl(220,30%,16%);--muted-fg:hsl(220,18%,58%);
  --primary:hsl(158,55%,42%);--primary-fg:hsl(222,47%,5%);
  --sidebar:hsl(222,47%,5%);--input:hsl(220,35%,18%);
  --chart1:#10b981;--chart2:#f59e0b;--chart3:#3b82f6;--chart4:#a78bfa;--chart5:#ef4444;
}
.light{
  --bg:hsl(215,25%,96%);--fg:hsl(222,47%,8%);--card:#fff;
  --border:hsl(214,32%,91%);--muted:hsl(210,40%,96%);--muted-fg:hsl(215,16%,47%);
  --primary:hsl(158,64%,36%);--primary-fg:#fff;
  --sidebar:hsl(222,47%,10%);--input:hsl(214,32%,91%);
  --chart1:#10b981;--chart2:#f59e0b;--chart3:#3b82f6;--chart4:#7c3aed;--chart5:#ef4444;
}
body{background:var(--bg);color:var(--fg)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.inp{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--input);background:var(--card);color:var(--fg);font-size:13px;font-family:'Cairo',sans-serif;outline:none;box-sizing:border-box;transition:border-color .2s}
.inp:focus{border-color:var(--primary)}
.btn{padding:8px 16px;border-radius:8px;border:none;background:var(--primary);color:var(--primary-fg);font-size:13px;font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:hover{opacity:.9}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-out{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--fg);font-size:13px;font-family:'Cairo',sans-serif;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-out:hover{background:var(--muted)}
.btn-gh{padding:5px 10px;border-radius:8px;border:none;background:transparent;color:var(--muted-fg);font-size:13px;font-family:'Cairo',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn-gh:hover{background:var(--muted)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:9px 10px;text-align:right;font-weight:700;font-size:11px;color:var(--muted-fg);background:var(--muted);border-bottom:1px solid var(--border)}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--fg)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px;border:1px solid transparent;background:transparent;cursor:pointer;text-align:right;font-size:13px;font-family:'Cairo',sans-serif;font-weight:600;color:var(--muted-fg);transition:all .15s;margin-bottom:2px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-b{padding:20px;overflow-y:auto;flex:1}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:700}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--fg);z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.3);min-width:220px;text-align:center}
.mob-hdr{display:none;background:var(--sidebar);border-bottom:1px solid rgba(255,255,255,.07);padding:10px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
@media(max-width:768px){.mob-hdr{display:flex!important}.dsk-sb{display:none!important}.mc{padding:12px!important}}
@media print{.np{display:none!important}body{background:#fff!important;color:#000!important}.card{background:#fff!important;border:1px solid #ccc!important}}
.prod-card{border-radius:10px;border:2px solid var(--border);background:var(--card);padding:10px;cursor:pointer;transition:all .15s;display:flex;gap:10px}
.prod-card.sel{border-color:var(--primary);background:rgba(16,185,129,.08)}
.prod-card:hover:not(.sel):not(.oos){border-color:rgba(16,185,129,.4)}
.prod-card.oos{opacity:.65;cursor:not-allowed;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.04)}
.kpi{border-radius:14px;padding:14px 16px;color:#fff;position:relative;overflow:hidden}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── SUPABASE ──────────────────────────────
const SB='https://wluwwfgbzwfdxbxcnpyl.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsdXd3ZmdiendmZHhieGNucHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTczODYsImV4cCI6MjA5NTk3MzM4Nn0.2hEogDdSxKkOqKcU_5-1-PowdS_POAVnIPzmdTbxhuI';
const api=async(p,o={})=>{
  const r=await fetch(SB+'/rest/v1/'+p,{headers:{apikey:SK,Authorization:'Bearer '+SK,'Content-Type':'application/json',Prefer:o.prefer||'return=representation',...(o.headers||{})},...o});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
};
const db={
  list:(t,q)=>api(t+'?'+(q||'')+'&order=created_at.asc'),
  add:(t,d)=>api(t,{method:'POST',body:JSON.stringify(d)}),
  set:(t,id,d)=>api(t+'?id=eq.'+id,{method:'PATCH',body:JSON.stringify(d)}),
  del:(t,id)=>api(t+'?id=eq.'+id,{method:'DELETE',prefer:'return=minimal'}),
  ups:(t,d)=>api(t,{method:'POST',body:JSON.stringify(d),headers:{Prefer:'resolution=merge-duplicates,return=representation'}}),
};

// ── HELPERS ───────────────────────────────
const fmt=n=>Number(n||0).toLocaleString('en-US');
const toDay=()=>new Date().toISOString().split('T')[0];
const todayDisp=()=>new Date().toLocaleDateString('en-GB');
const getSeason=d=>{const m=new Date(d).getMonth()+1;return[12,1,2].includes(m)?'شتاء':[3,4,5].includes(m)?'ربيع':[6,7,8].includes(m)?'صيف':'خريف';};

// ── DEFAULTS ──────────────────────────────
const DEF={
  delivery_zones:[
    {name:'زاخو',price:3000,cities:['زاخو']},
    {name:'مناطق كردستان',price:5000,cities:['أربيل','السليمانية','حلبجة','دهوك','كركوك']},
    {name:'المحافظات العراقية',price:5000,cities:['الأنبار (الرمادي)','القادسية (الديوانية)','المثنى (السماوة)','النجف','بابل (الحلة)','بصرة','بغداد','ديالى (بعقوبة)','ذي قار (الناصرية)','صلاح الدين (تكريت)','كربلاء','ميسان (العمارة)','نينوى (الموصل)','واسط (الكوت)']},
    {name:'الأهل والبيت',price:0,region:'family',cities:['الأهل والبيت']},
  ],
  categories:['ملابس_أطفال'],
  expense_categories:['تخفيضات_البريد','تعبئة اشتراك خط اسيا','تعبئه_كارت_RT'],
  next_order_id:1,
};

// ── STATE ─────────────────────────────────
let S={
  authed:!!localStorage.getItem('sb_auth'),
  page:'dashboard',loading:true,syncSt:'synced',dbErr:null,
  theme:localStorage.getItem('sb_theme')||'dark',
  lang:localStorage.getItem('sb_lang')||'ar',
  products:[],orders:[],expenses:[],taxis:[],shipments:[],
  settings:JSON.parse(JSON.stringify(DEF)),
};

// ── RENDER ENGINE ─────────────────────────
let _ren=false,_lPage=null,_lAuth=null,_lLoad=null,_lTheme=null;
const render=()=>{
  if(_ren)return;_ren=true;
  requestAnimationFrame(()=>{
    _ren=false;
    const root=document.getElementById('root');if(!root)return;
    const full=S.page!==_lPage||S.authed!==_lAuth||S.loading!==_lLoad||S.theme!==_lTheme;
    _lPage=S.page;_lAuth=S.authed;_lLoad=S.loading;_lTheme=S.theme;
    if(full){
      document.querySelectorAll('.overlay,.mob-ov').forEach(e=>e.remove());
      document.documentElement.className=S.theme;
      document.body.className=S.theme;
      root.innerHTML='';root.appendChild(buildApp());
    } else {
      const dot=document.querySelector('.sdot');const txt=document.querySelector('.stxt');
      if(dot&&txt){
        const c=S.syncSt==='error'?'#ef4444':S.syncSt==='saving'?'#fbbf24':'#10b981';
        dot.style.background=c;txt.textContent=S.syncSt==='error'?'خطأ في الحفظ':S.syncSt==='saving'?'جاري الحفظ...':'✓ محفوظ سحابياً';txt.style.color=c;
      }
    }
  });
};
const setState=p=>{Object.assign(S,typeof p==='function'?p(S):p);render();};

// ── DATA ──────────────────────────────────
const loadAll=async()=>{
  setState({loading:true,dbErr:null});
  try{
    const[p,o,e,tx,sh,st]=await Promise.all([db.list('products'),db.list('orders'),db.list('expenses'),db.list('taxi_rides'),db.list('shipments'),db.list('settings','id=eq.1')]);
    const settings=st?.length?st[0]:JSON.parse(JSON.stringify(DEF));
    if(!st?.length)await db.ups('settings',{id:1,...DEF});
    setState({products:p||[],orders:(o||[]).map(x=>({...x,items:x.items||[]})),expenses:e||[],taxis:tx||[],shipments:sh||[],settings,loading:false});
  }catch(err){setState({dbErr:err.message,loading:false});}
};
const sync=async fn=>{
  setState({syncSt:'saving'});
  try{await fn();setState({syncSt:'synced'});}
  catch(err){setState({syncSt:'error'});toast('❌ '+err.message);}
};
const toast=(msg,type='ok')=>{
  const t=document.createElement('div');t.className='toast np';
  t.style.borderColor=type==='err'?'rgba(239,68,68,.3)':'rgba(16,185,129,.3)';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
};

// ── DOM HELPERS ───────────────────────────
const el=(tag,a,...kids)=>{
  const e=document.createElement(tag);
  if(a)Object.entries(a).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')e.className=v;
    else if(k==='innerHTML')e.innerHTML=v;
    else if(k==='disabled'){v?e.setAttribute('disabled',''):e.removeAttribute('disabled');}
    else e.setAttribute(k,v);
  });
  kids.flat(Infinity).forEach(k=>{if(k==null||k===false)return;e.appendChild(typeof k==='string'||typeof k==='number'?document.createTextNode(String(k)):k);});
  return e;
};
const modal=(title,body,onClose,mw=560)=>{
  const ov=el('div',{className:'overlay np'});
  ov.onclick=e=>{if(e.target===ov)onClose();};
  const m=el('div',{className:'modal',style:{maxWidth:mw}});
  m.onclick=e=>e.stopPropagation();
  m.appendChild(el('div',{className:'modal-h'},el('h3',{style:{margin:0,fontSize:16,fontWeight:700}},title),el('button',{className:'btn-gh',style:{fontSize:18,padding:'2px 8px'},onClick:onClose},'✕')));
  m.appendChild(el('div',{className:'modal-b'},body));
  ov.appendChild(m);document.body.appendChild(ov);return ov;
};
const inp=(a={})=>el('input',{className:'inp',...a});
const sel=(val,opts,onChange)=>{
  const s=el('select',{className:'inp',onChange});
  opts.forEach(([v,t])=>{const o=el('option',{value:v},t||v);if(String(v)===String(val))o.selected=true;s.appendChild(o);});
  return s;
};
const lbl=t=>el('label',{style:{display:'block',fontSize:12,fontWeight:700,color:'var(--muted-fg)',marginBottom:5}},t);
const statCard=(label,value,icon,color,sub)=>{
  const d=el('div',{className:'card',style:{transition:'box-shadow .2s,transform .2s',cursor:'default'}});
  const row=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}});
  const left=el('div');
  left.appendChild(el('p',{style:{fontSize:11,color:'var(--muted-fg)',marginBottom:4}},label));
  left.appendChild(el('p',{style:{fontSize:22,fontWeight:800,color:color||'var(--fg)'}},fmt(value)));
  if(sub)left.appendChild(el('p',{style:{fontSize:11,color:'var(--muted-fg)',marginTop:3}},sub));
  row.appendChild(left);if(icon)row.appendChild(el('span',{style:{fontSize:24,opacity:.7}},icon));
  d.appendChild(row);return d;
};

// ── NAV ───────────────────────────────────
const NAV=[
  {id:'dashboard',label:'لوحة التحكم',icon:'📊',color:'#38bdf8'},
  {id:'orders',label:'المبيعات',icon:'📋',color:'#34d399'},
  {id:'products',label:'المنتجات والمخزون',icon:'📦',color:'#a78bfa'},
  {id:'expenses',label:'المصروفات',icon:'🧾',color:'#fb923c'},
  {id:'taxi',label:'تكسي داخلي',icon:'🚕',color:'#fbbf24'},
  {id:'shipment',label:'وجبة (طيارة/سفينة)',icon:'🚢',color:'#22d3ee'},
  {id:'reports',label:'التقارير',icon:'📈',color:'#f472b6'},
  {id:'settings',label:'الإعدادات',icon:'⚙️',color:'#94a3b8'},
  {id:'backup',label:'النسخ الاحتياطي',icon:'💾',color:'#10b981'},
];

// ── SIDEBAR ───────────────────────────────
const buildSB=(closeFn=()=>{})=>{
  const{page,syncSt,lang,theme}=S;
  const lowStock=S.products.filter(p=>p.stock<=(p.min_stock||1)).length;
  const w=el('div',{style:{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}});

  // Logo
  w.appendChild(el('div',{style:{padding:'18px 16px',borderBottom:'1px solid rgba(255,255,255,.07)',flexShrink:0}},
    el('div',{style:{display:'flex',alignItems:'center',gap:10}},
      el('div',{style:{width:40,height:40,borderRadius:14,background:'linear-gradient(135deg,#10b981,#059669)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,boxShadow:'0 4px 16px rgba(16,185,129,.45)',flexShrink:0}},'🌾'),
      el('div',null,el('p',{style:{fontWeight:800,fontSize:'1.05rem',color:'#fff'}},'pos-sonbola'),el('p',{style:{fontSize:10,color:'rgba(52,211,153,.65)'}},'نظام إدارة المبيعات'))
    )
  ));

  // Sync
  const sc=syncSt==='error'?'#ef4444':syncSt==='saving'?'#fbbf24':'#10b981';
  w.appendChild(el('div',{style:{padding:'5px 14px',background:syncSt==='error'?'rgba(239,68,68,.1)':syncSt==='saving'?'rgba(251,191,36,.1)':'rgba(16,185,129,.07)',display:'flex',alignItems:'center',gap:7,flexShrink:0}},
    el('div',{className:'sdot',style:{width:7,height:7,borderRadius:'50%',background:sc,boxShadow:'0 0 6px '+sc,flexShrink:0}}),
    el('span',{className:'stxt',style:{fontSize:11,color:sc}},syncSt==='error'?'خطأ في الحفظ':syncSt==='saving'?'جاري الحفظ...':'✓ محفوظ سحابياً')
  ));

  // Nav
  const nav=el('nav',{style:{flex:1,padding:'8px',overflowY:'auto'}});
  NAV.forEach(item=>{
    const active=page===item.id;
    const b=el('button',{className:'nav-btn',style:{color:active?item.color:'var(--muted-fg)',background:active?item.color+'14':'transparent',border:active?'1px solid '+item.color+'28':'1px solid transparent',boxShadow:active?'0 0 20px '+item.color+'1a':'none'},onClick:()=>{setState({page:item.id});closeFn();}});
    b.appendChild(el('div',{style:{width:36,height:36,borderRadius:10,background:active?item.color+'22':'rgba(255,255,255,.05)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:16,boxShadow:active?'0 4px 12px '+item.color+'44':'none'}},item.icon));
    b.appendChild(el('span',{style:{flex:1}},item.label));
    if(item.id==='products'&&lowStock>0)b.appendChild(el('span',{style:{background:'#ef4444',color:'#fff',fontSize:10,borderRadius:10,padding:'1px 7px',fontWeight:700}},lowStock));
    if(active)b.appendChild(el('div',{style:{width:7,height:7,borderRadius:'50%',background:item.color,flexShrink:0,boxShadow:'0 0 8px '+item.color}}));
    nav.appendChild(b);
  });
  w.appendChild(nav);

  // Bottom
  const bot=el('div',{style:{padding:'10px',borderTop:'1px solid rgba(255,255,255,.06)',flexShrink:0}});
  const lr=el('div',{style:{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:14,padding:'10px 12px',marginBottom:8}});
  lr.appendChild(el('p',{style:{fontSize:10,color:'#475569',marginBottom:8,fontWeight:700,textTransform:'uppercase',letterSpacing:'1px'}},'اللغة'));
  const lbtns=el('div',{style:{display:'flex',gap:5}});
  ['ar','en'].forEach(l=>{
    lbtns.appendChild(el('button',{style:{flex:1,padding:'6px',borderRadius:10,border:'none',background:lang===l?'linear-gradient(135deg,#10b981,#059669)':'rgba(255,255,255,.06)',color:lang===l?'#fff':'#64748b',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'Cairo,sans-serif'},onClick:()=>{localStorage.setItem('sb_lang',l);setState({lang:l});}},l==='ar'?'العربية 🇮🇶':'English 🇬🇧'));
  });
  const tb=el('button',{style:{width:32,height:32,borderRadius:10,border:'none',background:theme==='dark'?'linear-gradient(135deg,#f59e0b,#d97706)':'rgba(255,255,255,.1)',color:'#fff',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0},onClick:()=>{const nt=S.theme==='dark'?'light':'dark';localStorage.setItem('sb_theme',nt);setState({theme:nt});}},theme==='dark'?'☀️':'🌙');
  lbtns.appendChild(tb);lr.appendChild(lbtns);bot.appendChild(lr);
  bot.appendChild(el('button',{style:{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'9px 12px',borderRadius:12,border:'1px solid rgba(239,68,68,.18)',background:'rgba(239,68,68,.06)',color:'#f87171',fontSize:12,fontFamily:'Cairo,sans-serif',fontWeight:700,cursor:'pointer'},onClick:()=>{localStorage.removeItem('sb_auth');setState({authed:false,page:'dashboard'});}},'🚪 تسجيل الخروج'));
  w.appendChild(bot);
  return w;
};

// ── LOGIN ─────────────────────────────────
const buildLogin=()=>{
  let id='',pw='',showP=false;
  const w=el('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:16,background:'linear-gradient(135deg,#0f172a,#0c1f19,#0f172a)',position:'relative',overflow:'hidden'}});
  w.appendChild(el('div',{style:{position:'absolute',top:0,right:'25%',width:350,height:350,borderRadius:'50%',background:'radial-gradient(circle,rgba(16,185,129,.18),transparent 70%)',pointerEvents:'none'}}));
  w.appendChild(el('div',{style:{position:'absolute',bottom:0,left:'25%',width:300,height:300,borderRadius:'50%',background:'radial-gradient(circle,rgba(245,158,11,.13),transparent 70%)',pointerEvents:'none'}}));
  const inner=el('div',{style:{position:'relative',width:'100%',maxWidth:380}});
  inner.appendChild(el('div',{style:{textAlign:'center',marginBottom:32}},
    el('div',{style:{display:'inline-flex',alignItems:'center',justifyContent:'center',width:80,height:80,borderRadius:24,background:'linear-gradient(135deg,#10b981,#059669)',boxShadow:'0 8px 32px rgba(16,185,129,.4)',marginBottom:16,fontSize:36}},'🌾'),
    el('h1',{style:{fontSize:40,fontWeight:900,color:'#fff',marginBottom:4}},'سنبلة'),
    el('p',{style:{color:'rgba(52,211,153,.7)',fontSize:14}},'نظام إدارة المبيعات')
  ));
  const card=el('div',{style:{background:'rgba(255,255,255,.05)',backdropFilter:'blur(20px)',border:'1px solid rgba(255,255,255,.1)',borderRadius:28,padding:32}});
