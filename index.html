<head>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>

tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Cairo','sans-serif']}}}}

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.spin{animation:spin .8s linear infinite}
.fi{animation:fi .2s ease}

/* ── حجم الخط حسب المواصفات ─────────────── */
.text-xs{font-size:10px!important}        /* تسميات ثانوية */
.text-sm{font-size:11px!important}        /* نصوص ثانوية */
.text-base{font-size:14px!important}      /* نصوص جداول */
.text-lg{font-size:16px!important}        /* عناوين */
.text-xl{font-size:18px!important}        /* عناوين رئيسية */

/* Dark theme vars */
.dark{
  --bg:#0f172a;--fg:#ffffff;--card:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.08);--muted:rgba(255,255,255,.04);--muted-fg:#64748b;
  --primary:#10b981;--primary-fg:#fff;
  --sidebar:#0b1120;--input:rgba(255,255,255,.15);
  --chart1:#10b981;--chart2:#fb923c;--chart3:#38bdf8;--chart4:#a78bfa;--chart5:#f87171;
  --radius-card:16px;--radius-icon:12px;--radius-btn:16px;
  --transition:all 200ms ease;
}
.light{
  --bg:#ffffff;--fg:#0f172a;--card:#fff;
  --border:#e2e8f0;--muted:#f8fafc;--muted-fg:#64748b;
  --primary:#10b981;--primary-fg:#fff;
  --sidebar:#0b1120;--input:#e2e8f0;
  --chart1:#10b981;--chart2:#fb923c;--chart3:#38bdf8;--chart4:#a78bfa;--chart5:#f87171;
  --radius-card:16px;--radius-icon:12px;--radius-btn:16px;
  --transition:all 200ms ease;
}
body{background:var(--bg);color:var(--fg)}

/* ── البطاقات — rounded-2xl = 16px ─────── */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-card);padding:20px;
  transition:var(--transition);
}

/* ── الحقول ──────────────────────────────── */
.inp{
  width:100%;padding:8px 12px;
  border-radius:var(--radius-btn);
  border:1px solid var(--input);background:var(--card);
  color:var(--fg);font-size:14px;font-family:'Cairo',sans-serif;
  outline:none;box-sizing:border-box;
  transition:border-color 200ms ease,background 200ms ease;
}
.inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(16,185,129,.15)}

/* ── الأزرار الرئيسية — rounded-2xl ──────── */
.btn{
  padding:8px 16px;border-radius:var(--radius-btn);border:none;
  background:linear-gradient(135deg,#10b981,#059669);color:#fff;
  font-size:14px;font-family:'Cairo',sans-serif;font-weight:700;
  cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  box-shadow:0 2px 12px rgba(16,185,129,.3);
  transition:var(--transition);
}
.btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 20px rgba(16,185,129,.45)}
.btn:active{transform:translateY(0)}.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

.btn-out{
  padding:8px 14px;border-radius:var(--radius-btn);
  border:1px solid var(--border);background:transparent;
  color:var(--fg);font-size:14px;font-family:'Cairo',sans-serif;font-weight:600;
  cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  transition:var(--transition);
}
.btn-out:hover{background:var(--muted)}

.btn-gh{
  padding:5px 10px;border-radius:8px;border:none;
  background:transparent;color:var(--muted-fg);
  font-size:13px;font-family:'Cairo',sans-serif;
  cursor:pointer;display:inline-flex;align-items:center;gap:5px;
  transition:var(--transition);
}
.btn-gh:hover{background:var(--muted)}

/* ── الجداول — font 14px ─────────────────── */
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{
  padding:9px 10px;text-align:right;font-weight:700;
  font-size:11px;color:var(--muted-fg);
  background:var(--muted);border-bottom:1px solid var(--border);
}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--fg);vertical-align:middle;overflow:hidden}
.tbl td img{width:48px!important;height:48px!important;max-width:48px!important;max-height:48px!important;object-fit:cover;border-radius:8px;display:block}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02);transition:var(--transition)}

/* ── شريط التنقل ──────────────────────────── */
.nav-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:var(--radius-icon);
  border:1px solid transparent;background:transparent;
  cursor:pointer;text-align:right;font-size:14px;
  font-family:'Cairo',sans-serif;font-weight:600;
  color:var(--muted-fg);transition:var(--transition);margin-bottom:2px;
}

/* ── Overlay & Modal ─────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{
  background:#1e293b;border:1px solid var(--border);
  border-radius:var(--radius-card);
  width:100%;max-width:560px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;
}
.light .modal{background:#ffffff;}
.dark .modal .inp{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15);}
.dark .modal select.inp{background:#253347;color:#fff;}
.dark .modal-h{background:#1e293b;}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-b{padding:20px;overflow-y:auto;flex:1;background:inherit}

/* ── Badges ──────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:700}

/* ── Toast ───────────────────────────────── */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-card);padding:12px 20px;
  font-size:14px;color:var(--fg);z-index:999;
  box-shadow:0 8px 32px rgba(0,0,0,.3);min-width:220px;text-align:center;
}

/* ── Mobile header ───────────────────────── */
.mob-hdr{
  display:none;background:var(--sidebar);
  border-bottom:1px solid rgba(255,255,255,.07);
  padding:10px 16px;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;
}
@media(max-width:768px){.mob-hdr{display:flex!important}.dsk-sb{display:none!important}.mc{padding:12px!important}}
@media print{.np{display:none!important}body{background:#fff!important;color:#000!important}.card{background:#fff!important;border:1px solid #ccc!important}}

/* ── Product cards ────────────────────────── */
.prod-card{
  border-radius:10px;border:2px solid var(--border);
  background:var(--card);padding:6px 4px;cursor:pointer;
  transition:var(--transition);display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;overflow:hidden;
}
.prod-card.sel{border-color:var(--primary);background:rgba(16,185,129,.05);box-shadow:0 0 14px rgba(16,185,129,.2)}
.prod-card:hover:not(.sel):not(.oos){border-color:rgba(16,185,129,.5);box-shadow:0 0 10px rgba(16,185,129,.15)}
.prod-card.oos{opacity:.6;cursor:not-allowed;border-color:rgba(248,113,113,.3)}

/* ── KPI cards ────────────────────────────── */
.kpi{border-radius:14px;padding:14px 16px;color:#fff;position:relative;overflow:hidden;transition:var(--transition)}
.kpi:hover{transform:translateY(-2px);filter:brightness(1.08)}

/* ── Icon glow effect حسب المواصفات ─────── */
.icon-box{
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-icon);flex-shrink:0;
  transition:var(--transition);
}
.nav-btn:hover .icon-box{filter:brightness(1.2)}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── معالج الأخطاء العام ───────────────────
window.onerror = function(msg, src, line, col, err) {
  console.error('JS Error:', msg, src, line);
};
// ══════════════════════════════════════════════════
// ██████╗  ██████╗  ██████╗
// ██╔══██╗██╔═══██╗██╔════╝
// ██████╔╝██║   ██║██║
// ██╔═══╝ ██║   ██║██║
// ██║     ╚██████╔╝╚██████╗
// ╚═╝      ╚═════╝  ╚═════╝  FIREBASE EDITION
// ══════════════════════════════════════════════════

// ══════════════════════════════════════════════════
// FIREBASE + localStorage HYBRID
// Firebase للبيانات الحقيقية — localStorage للكاش المحلي
// ══════════════════════════════════════════════════

const FB_CONFIG = {
  apiKey:            "AIzaSyBqf7nAzt9lSgI79vzSDvLvN5pjMOfUFXw",
  authDomain:        "sonbola-pos.firebaseapp.com",
  projectId:         "sonbola-pos",
  storageBucket:     "sonbola-pos.firebasestorage.app",
  messagingSenderId: "626312367633",
  appId:             "1:626312367633:web:cd3604887607e15814abb0"
};

// ── localStorage للكاش ─────────────────────────
const LS_KEY = 'snb_db_v2';
const lsLoad = () => { try { return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); } catch(e) { return {}; } };
const lsSave = d => { try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch(e) {} };
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

// ── Firebase init ──────────────────────────────
let fstore = null;
const initFirebase = async () => {
  try {
    if(!window.firebase) return false;
    if(!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    fstore = firebase.firestore();
    return true;
  } catch(e) { console.error('Firebase init:', e); return false; }
};

// ── CACHE ──────────────────────────────────────
const CACHE_KEY = 'fb_cache_v1';
const saveCache = data => { try { localStorage.setItem(CACHE_KEY, JSON.stringify({ts:Date.now(),data})); } catch(e){} };
const loadCache = () => { try { const c=localStorage.getItem(CACHE_KEY); return c?JSON.parse(c):null; } catch(e){return null;} };

// ── db layer: Firebase أولاً، localStorage احتياطي ─
const db = {
  list: async (col) => {
    if(fstore){
      try{
        const snap = await fstore.collection(col).get();
        const docs = snap.docs.map(d=>({id:d.id,...d.data()}));
        docs.sort((a,b)=>{
          const ta=a.created_at?.toMillis?.()||a.created_at?.seconds*1000||a._ts||0;
          const tb=b.created_at?.toMillis?.()||b.created_at?.seconds*1000||b._ts||0;
          return ta-tb;
        });
        return docs;
      }catch(e){console.warn('Firebase list failed, using cache:',e.message);}
    }
    const store=lsLoad(); return (store[col]||[]);
  },
  add: async (col, data) => {
    const payload = Array.isArray(data)?data:[data];
    const results = [];
    for(const item of payload){
      if(fstore){
        try{
          const ref = await fstore.collection(col).add({...item, created_at: firebase.firestore.FieldValue.serverTimestamp()});
          const rec = {id:ref.id,...item};
          results.push(rec); continue;
        }catch(e){console.warn('Firebase add failed:',e.message);}
      }
      // fallback localStorage
      const store=lsLoad(); if(!store[col])store[col]=[];
      const rec={...item,id:item.id||genId(),_ts:Date.now()};
      store[col].push(rec); lsSave(store); results.push(rec);
    }
    return Array.isArray(data)?results:results[0];
  },
  set: async (col, id, data) => {
    if(fstore){
      try{
        await fstore.collection(col).doc(String(id)).update(data);
        return {id,...data};
      }catch(e){console.warn('Firebase set failed:',e.message);}
    }
    const store=lsLoad(); if(!store[col])store[col]=[];
    const idx=store[col].findIndex(r=>String(r.id)===String(id));
    const rec={...(store[col][idx]||{}),...data,id:String(id),_ts:Date.now()};
    if(idx>=0)store[col][idx]=rec; else store[col].push(rec);
    lsSave(store); return rec;
  },
  del: async (col, id) => {
    if(fstore){
      try{ await fstore.collection(col).doc(String(id)).delete(); return null; }
      catch(e){console.warn('Firebase del failed:',e.message);}
    }
    const store=lsLoad();
    if(store[col])store[col]=store[col].filter(r=>String(r.id)!==String(id));
    lsSave(store); return null;
  },
  ups: async (col, data) => {
    const payload=Array.isArray(data)?data:[data];
    const results=[];
    for(const item of payload){
      if(item.id)results.push(await db.set(col,item.id,item));
      else results.push(await db.add(col,item));
    }
    return Array.isArray(data)?results:results[0];
  },
};

// ── stubs لتوافق باقي الكود ───────────────────
const addDoc    = async (col,data) => db.add(col,data);
const collection= (_,col) => col;
const serverTimestamp = () => firebase&&firebase.firestore ? firebase.firestore.FieldValue.serverTimestamp() : Date.now();
const getDocs   = async (col) => {
  const rows = await db.list(col);
  return { docs: rows.map(r=>({id:r.id, data:()=>r, ref:{id:r.id,_col:col,delete:()=>db.del(col,r.id)}})) };
};
const deleteDoc = async (ref) => { if(ref&&ref._col&&ref.id) await db.del(ref._col,ref.id); };
const writeBatch = () => {
  const ops=[];
  return {
    delete:(ref)=>{ops.push({type:'del',ref});},
    commit:async()=>{ for(const op of ops){ if(op.type==='del') await deleteDoc(op.ref); } }
  };
};


// ── HELPERS ───────────────────────────────
const fmt=n=>Number(n||0).toLocaleString('en-US');
const toDay=()=>new Date().toISOString().split('T')[0];
const todayDisp=()=>new Date().toLocaleDateString('en-GB');
const getSeason=d=>{const m=new Date(d).getMonth()+1;return[12,1,2].includes(m)?'شتاء':[3,4,5].includes(m)?'ربيع':[6,7,8].includes(m)?'صيف':'خريف';};

// ── DEFAULTS ──────────────────────────────
const DEF={
  delivery_zones:[
    {name:'زاخو',price:3000,cities:['زاخو']},
    {name:'مناطق كردستان',price:5000,cities:['أربيل','السليمانية','حلبجة','دهوك','كركوك']},
    {name:'المحافظات العراقية',price:5000,cities:['الأنبار (الرمادي)','القادسية (الديوانية)','المثنى (السماوة)','النجف','بابل (الحلة)','بصرة','بغداد','ديالى (بعقوبة)','ذي قار (الناصرية)','صلاح الدين (تكريت)','كربلاء','ميسان (العمارة)','نينوى (الموصل)','واسط (الكوت)']},
    {name:'الأهل والبيت',price:0,region:'family',cities:['الأهل والبيت']},
  ],
  categories:['ملابس_أطفال'],
  expense_categories:['تخفيضات_البريد','تعبئة اشتراك خط اسيا','تعبئه_كارت_RT'],
  next_order_id:1,
};

// ── STATE ─────────────────────────────────
const _isAuthed=!!(localStorage.getItem('fb_auth')||sessionStorage.getItem('fb_auth'));
let S={
  authed:_isAuthed,
  page:'dashboard',loading:_isAuthed,syncSt:'synced',dbErr:null,
  theme:localStorage.getItem('fb_theme')||'dark',
  lang:localStorage.getItem('fb_lang')||'ar',
  products:[],orders:[],expenses:[],taxis:[],shipments:[],
  settings:JSON.parse(JSON.stringify(DEF)),
};

// ── RENDER ENGINE ─────────────────────────
let _raf=null;
const render=()=>{
  if(_raf)cancelAnimationFrame(_raf);
  _raf=requestAnimationFrame(()=>{
    _raf=null;
    const root=document.getElementById('root');if(!root)return;
    document.documentElement.className=S.theme;
    document.body.className=S.theme;
    document.documentElement.dir=S.lang==='ar'?'rtl':'ltr';
    document.documentElement.lang=S.lang;
    document.querySelectorAll('.overlay,.mob-ov').forEach(e=>e.remove());
    root.innerHTML='';
    try{ root.appendChild(buildApp()); }catch(e){ console.error('render error:',e); }
    // تحديث مؤشر المزامنة فقط
    const dot=document.querySelector('.sdot');const txt=document.querySelector('.stxt');
    if(dot&&txt){
      const c=S.syncSt==='error'?'#f87171':S.syncSt==='saving'?'#fbbf24':'#10b981';
      dot.style.background=c;txt.textContent=S.syncSt==='error'?'خطأ في الحفظ':S.syncSt==='saving'?'جاري الحفظ...':'✓ محفوظ سحابياً';txt.style.color=c;
    }
  });
};
const setState=p=>{Object.assign(S,typeof p==='function'?p(S):p);render();};

// ── DATA ──────────────────────────────────
const loadAll=async()=>{
  setState({loading:true,dbErr:null});
  // timeout أمان — لا تبقى الشاشة سوداء أكثر من 20 ثانية
  const safetyTimer=setTimeout(()=>{
    if(S.loading){
      console.warn('loadAll timeout — forcing loading:false');
      setState({loading:false,dbErr:'انتهت مهلة الاتصال — تحقق من الإنترنت وأعد المحاولة'});
    }
  },20000);

  // تهيئة Firebase إذا لم تكن جاهزة
  if(!fstore){
    const ok = await initFirebase();
    if(!ok){ clearTimeout(safetyTimer); setState({dbErr:'فشل الاتصال — تحقق من الإنترنت',loading:false}); return; }
  }

  // عرض الكاش فوراً إن وجد
  const cached=loadCache();
  if(cached&&(Date.now()-cached.ts)<600000){
    const d=cached.data;
    setState({products:d.products||[],orders:d.orders||[],expenses:d.expenses||[],
      taxis:d.taxis||[],shipments:d.shipments||[],
      settings:d.settings||JSON.parse(JSON.stringify(DEF)),loading:false,dbErr:null});
  }

  try{
    const safe=async(fn)=>{try{return await fn();}catch(e){console.warn(e.message);return[];}};
    const[p,o,e,cats,expCats,provs,appSt]=await Promise.all([
      safe(()=>db.list('products')),
      safe(()=>db.list('orders')),
      safe(()=>db.list('expenses')),
      safe(()=>db.list('categories')),
      safe(()=>db.list('expense_categories')),
      safe(()=>db.list('provinces')),
      safe(()=>db.list('app_settings')),
    ]);
    const catNames=(cats||[]).map(c=>c.name);
    const expCatNames=(expCats||[]).map(c=>c.name);
    const appStMap={};(appSt||[]).forEach(r=>{try{appStMap[r.key]=typeof r.value==='string'?JSON.parse(r.value):r.value;}catch(e){appStMap[r.key]=r.value;}});
    const zonesMap={};
    (provs||[]).forEach(pv=>{
      const region=pv.region||'iraq';
      if(!zonesMap[region])zonesMap[region]={name:region==='zakho'?'زاخو':region==='kurdistan'?'مناطق كردستان':region==='family'?'الأهل والبيت':'المحافظات العراقية',price:pv.shipping_price||5000,region,cities:[]};
      zonesMap[region].cities.push(pv.name);
    });
    const delivery_zones=Object.values(zonesMap);
    const settings={
      ...JSON.parse(JSON.stringify(DEF)),
      categories:catNames.length?catNames:DEF.categories,
      expense_categories:expCatNames.length?expCatNames:DEF.expense_categories,
      delivery_zones:delivery_zones.length?delivery_zones:DEF.delivery_zones,
      next_order_id:appStMap['next_order_id']||DEF.next_order_id,
    };
    const orders=(o||[]).map(x=>({...x,items:x.items||[]})).reverse();
    saveCache({products:p||[],orders,expenses:e||[],taxis:[],shipments:[],settings});
    clearTimeout(safetyTimer);
    setState({products:p||[],settings,orders,expenses:e||[],taxis:[],shipments:[],loading:false,dbErr:null});
  }catch(err){
    console.error('loadAll error:',err);
    clearTimeout(safetyTimer);
    if(cached)setState({loading:false,syncSt:'error'});
    else setState({dbErr:err.message,loading:false});
  }
};
const sync=async fn=>{
  setState({syncSt:'saving'});
  try{await fn();setState({syncSt:'synced'});}
  catch(err){console.error('SYNC ERROR:',err);setState({syncSt:'error'});toast('❌ '+err.message);}
};
const toast=(msg,type='ok')=>{
  const t=document.createElement('div');t.className='toast np';
  t.style.borderColor=type==='err'?'rgba(248,113,113,.3)':'rgba(16,185,129,.3)';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
};

// ── DOM HELPERS ───────────────────────────
const el=(tag,a,...kids)=>{
  const e=document.createElement(tag);
  if(a)Object.entries(a).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')e.className=v;
    else if(k==='innerHTML')e.innerHTML=v;
    else if(k==='disabled'){v?e.setAttribute('disabled',''):e.removeAttribute('disabled');}
    else e.setAttribute(k,v);
  });
  kids.flat(Infinity).forEach(k=>{if(k==null||k===false)return;e.appendChild(typeof k==='string'||typeof k==='number'?document.createTextNode(String(k)):k);});
  return e;
};
const modal=(title,body,onClose,mw=560)=>{
  const ov=el('div',{className:'overlay np'});
  ov.onclick=e=>{if(e.target===ov)onClose();};
  const m=el('div',{className:'modal',style:{maxWidth:mw}});
  m.onclick=e=>e.stopPropagation();
  m.appendChild(el('div',{className:'modal-h'},el('h3',{style:{margin:0,fontSize:16,fontWeight:700}},title),el('button',{className:'btn-gh',style:{padding:'4px 8px',color:'var(--muted-fg)'},onClick:onClose},lucideIcon('X',16,'currentColor'))));
  m.appendChild(el('div',{className:'modal-b'},body));
  ov.appendChild(m);document.body.appendChild(ov);return ov;
};
const inp=(a={})=>el('input',{className:'inp',...a});
const sel=(val,opts,onChange)=>{
  const s=el('select',{className:'inp',onChange});
  opts.forEach(([v,t])=>{const o=el('option',{value:v},t||v);if(String(v)===String(val))o.selected=true;s.appendChild(o);});
  return s;
};

    body.appendChild(sum);

    };

      el('button',{className:'btn',onClick:async()=>{
        if(!fd.province||cart.length===0)return alert('يرجى تحديد المحافظة والمنتجات');
        const sub=cart.reduce((s,i)=>s+i.sellPrice*i.qty,0);
        const bt=cart.reduce((s,i)=>s+i.buyPrice*i.qty,0);
        const di=Number(fd.discount)||0;const dl=getD(fd.province);
        const profit=sub-bt-di;
        await sync(async()=>{
          if(eo){const u={...eo,province:fd.province,channel:fd.channel,items:cart,total:sub,discount:di,delivery_cost:dl,profit,date:fd.date,notes:fd.notes};await db.set('orders',eo.id,u);S.orders=S.orders.map(o=>o.id===eo.id?u:o);}
          else{const nId=S.settings.next_order_id||S.orders.length+1;const id='NO-'+String(nId).padStart(4,'0');const order={id,province:fd.province,channel:fd.channel,items:cart,total:sub,discount:di,delivery_cost:dl,profit,date:fd.date,notes:fd.notes};await db.add('orders',order);for(const it of cart){const p=S.products.find(x=>x.id===it.productId);if(p)await db.set('products',p.id,{stock:Math.max(0,p.stock-it.qty)});}// حفظ next_order_id في Firestore
{if(fstore){const snap=await fstore.collection('app_settings').get();const existing=snap.docs.find(d=>d.data().key==='next_order_id');if(existing){await existing.ref.update({value:String(nId+1)});}else{await fstore.collection('app_settings').add({key:'next_order_id',value:String(nId+1),created_at:firebase.firestore.FieldValue.serverTimestamp()});}}}S.settings={...S.settings,next_order_id:nId+1};S.orders=[...S.orders,order];}
        });

      }},eo?'💾 حفظ التعديلات':'💾 حفظ الطلبية')
    ));

};

// IMAGE COMPRESSOR
// ════════════════════════════════════════
const compressImage=(file,maxW=800,maxH=800,quality=0.75)=>new Promise((resolve,reject)=>{
  const reader=new FileReader();
  reader.onerror=()=>reject(new Error('فشل قراءة الملف'));
  reader.onload=ev=>{
    const img=new Image();
    img.onerror=()=>reject(new Error('فشل تحميل الصورة'));
    img.onload=()=>{
      // احسب الأبعاد الجديدة مع الحفاظ على النسبة
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      // اضغط كـ JPEG
      const compressed=canvas.toDataURL('image/jpeg',quality);
      // حساب الأحجام للعرض
      const origKB=Math.round(file.size/1024);
      const compKB=Math.round((compressed.length*3/4)/1024);
      resolve({dataUrl:compressed,origKB,compKB,w,h});
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
});

      el('button',{className:'btn-out np',onClick:async()=>{
        // ── دالة مساعدة: تحويل dataURL أو URL إلى ArrayBuffer ──
        const toArrayBuffer = async (src) => {
          if(!src) return null;
          try {
            if(src.startsWith('data:')) {
              // base64 dataURL
              const base64 = src.split(',')[1];
              const bin = atob(base64);
              const buf = new Uint8Array(bin.length);
              for(let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
              return buf.buffer;
            } else {
              // URL خارجي
              const res = await fetch(src);
              return await res.arrayBuffer();
            }
          } catch(e) { return null; }
        };

        // ── اكتشاف نوع الصورة ──
        const imgExt = (src) => {
          if(!src) return 'png';
          if(src.startsWith('data:image/jpeg')||src.startsWith('data:image/jpg')) return 'jpeg';
          if(src.startsWith('data:image/gif')) return 'gif';
          if(src.startsWith('data:image/webp')) return 'png'; // ExcelJS لا يدعم webp، نحوّله

          if(/\.gif(\?|$)/i.test(src)) return 'gif';
          return 'png';
        };

        // ── تحويل webp إلى png عبر canvas ──
        const webpToPng = (src) => new Promise(resolve => {
          try {
            const img = new Image();
            img.crossOrigin='anonymous';
            img.onload = () => {
              const c = document.createElement('canvas');
              c.width=img.width; c.height=img.height;
              c.getContext('2d').drawImage(img,0,0);
              resolve(c.toDataURL('image/png'));
            };
            img.onerror = () => resolve(null);
            img.src = src;
          } catch(e){ resolve(null); }
        });

        // ── إنشاء الـ Workbook ──
        const wb = new ExcelJS.Workbook();

          {key:'sea',   width:12},
          {key:'buy',   width:14},
          {key:'sell',  width:14},
          {key:'stk',   width:10},
          {key:'prof',  width:14},
          {key:'date',  width:14},
        ];

        // ── رأس الجدول ──
        const hRow = ws.addRow(['#','الصورة','الاسم','الموسم','سعر الشراء','سعر البيع','المخزون','الربح','تاريخ الإضافة']);
        hRow.height = 28;
        const borderStyle = {style:'thin', color:{argb:'FFD1D5DB'}};
        const allBorders = {top:borderStyle,left:borderStyle,bottom:borderStyle,right:borderStyle};
        hRow.eachCell(cell=>{
          cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1a5c35'}};
          cell.font={bold:true,color:{argb:'FFFFFFFF'},size:12,name:'Cairo'};
          cell.alignment={vertical:'middle',horizontal:'center',wrapText:true};

        // ── حجم الصورة والصف ──

        // عرض العمود بوحدة Excel ≈ 6pt لكل وحدة
        // ارتفاع الصف = IMG_PX * 0.75 (تحويل px→pt)
        const IMG_PX = 60; // حجم الصورة المربع بالبكسل
        const COL_IMG_PX = IMG_PX; // عرض عمود الصورة = حجم الصورة
        const COL_IMG_W = COL_IMG_PX / 6; // تحويل px إلى وحدات Excel (≈6pt/unit)
        const ROW_PT = Math.round(IMG_PX * 0.75); // ارتفاع الصف بالنقاط = حجم الصورة

        // ── تحديث عرض عمود الصورة ليساوي ارتفاع الصف ──

        // ── إضافة البيانات (تخطي المنتجات الفارغة) ──

        for(let i=0;i<S.products.length;i++){
          const p = S.products[i];

          if(!p.name && !p.sell_price && !p.buy_price) continue;
          const profit = Number(p.sell_price||0)-Number(p.buy_price||0);
          const dateVal = (()=>{
            if(p.added_date) return p.added_date;
            if(p.created_at){
              if(p.created_at.toDate) return p.created_at.toDate().toISOString().split('T')[0];
              if(p.created_at.seconds) return new Date(p.created_at.seconds*1000).toISOString().split('T')[0];
              if(typeof p.created_at==='string') return p.created_at.split('T')[0];
            }
            return '';
          })();

          const row = ws.addRow([
            rowIdx - 1,
            '',
            p.name||'',
            p.season||'',
            Number(p.buy_price||0),
            Number(p.sell_price||0),
            Number(p.stock||0),
            profit,
            dateVal
          ]);
          row.height = ROW_PT;

          // تنسيق الخلايا + حدود لكل خلية
          row.eachCell((cell,colNum)=>{
            cell.alignment={vertical:'middle',horizontal:'center',wrapText:false};

            cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFFFFF'}};
            cell.border = allBorders;

          // ── إدراج الصورة تملأ الخلية بالكامل ──

            if(imgSrc){
              // تحجيم الصورة لنفس الحجم الثابت عبر canvas لمنع الإزاحة
              const resizedSrc = await new Promise(resolve => {
                try {
                  const img = new Image();

                    const c = document.createElement('canvas');
                    c.width = IMG_PX; c.height = IMG_PX;
                    c.getContext('2d').drawImage(img, 0, 0, IMG_PX, IMG_PX);

        // ── صف المجاميع ──
        const lastDataRow = rowIdx - 1;
        const totalRow = ws.addRow([
          '', 'المجموع', '', '',
          {formula:`SUM(E2:E${lastDataRow})`},
          {formula:`SUM(F2:F${lastDataRow})`},
          {formula:`SUM(G2:G${lastDataRow})`},
          {formula:`SUM(H2:H${lastDataRow})`},

        totalRow.height = 32;
        totalRow.eachCell((cell, colNum) => {

        a.click();
        toast('✅ تم تصدير Excel بالصور!');
      }},
        el('span',null,'⬇️ تنزيل Excel')
      ),
      el('button',{className:'btn np',onClick:()=>openF(null)},
        el('span',{style:{fontSize:16,fontWeight:900}},'+'),
        el('span',null,' إضافة منتج')
      )
    )
  ));

  // ── بطاقة الجدول ──
  const tw=el('div',{className:'card',style:{padding:0,overflow:'hidden'}});

  // عنوان البطاقة
  tw.appendChild(el('div',{style:{padding:'14px 18px',borderBottom:'1px solid var(--border)',display:'flex',flexDirection:'column',alignItems:'center',gap:10}},
    el('span',{style:{fontWeight:700,fontSize:14}},'قائمة المنتجات'),
    el('div',{style:{width:300}},
      inp({placeholder:'ابحث بالاسم أو الفئة...',style:{paddingRight:14,paddingLeft:14,height:36,fontSize:13,borderRadius:20,width:'100%',textAlign:'right'},onInput:e=>{srch=e.target.value;rT();}})
    )

  const tbl=el('table',{className:'tbl'});
  tbl.appendChild(el('thead',null,el('tr',null,
    ...['الصورة','الاسم','الفئة','الموسم','سعر الشراء','سعر البيع','المخزون ↕','الحالة','تاريخ الإضافة','إجراءات']
      .map(h=>el('th',null,h))

  const tb=el('tbody');tbl.appendChild(tb);tw.appendChild(tbl);d.appendChild(tw);

  const rT=()=>{

  const avg=orders.length?Math.round(pp/orders.length):0;
  const sv=products.reduce((s,p)=>s+p.buy_price*p.stock,0);
  const sD={ربيع:0,صيف:0,خريف:0,شتاء:0};
  orders.forEach(o=>sD[getSeason(o.date||toDay())]+=Number(o.total));

  expenses.forEach(e=>{const m=(e.expenseDate||e.date||'').substring(0,7);if(!monthly[m])monthly[m]={month:m,revenue:0,expenses:0};monthly[m].expenses+=Number(e.amount);});
  const mArr=Object.values(monthly).sort((a,b)=>a.month.localeCompare(b.month)).map(x=>({...x,profit:x.revenue-x.expenses}));
  const top=products.map(p=>({...p,sq:orders.reduce((s,o)=>s+(o.items||[]).filter(i=>i.productId===p.id).reduce((ss,i)=>ss+i.qty,0),0),sr:orders.reduce((s,o)=>s+(o.items||[]).filter(i=>i.productId===p.id).reduce((ss,i)=>ss+i.sellPrice*i.qty,0),0),sp:orders.reduce((s,o)=>s+(o.items||[]).filter(i=>i.productId===p.id).reduce((ss,i)=>ss+(i.sellPrice-i.buyPrice)*i.qty,0),0)})).sort((a,b)=>b.sr-a.sr);
  const pd={};orders.forEach(o=>{if(!pd[o.province])pd[o.province]={province:o.province,orders:0,revenue:0};pd[o.province].orders++;pd[o.province].revenue+=Number(o.total);});

  const br=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}});
  br.appendChild(el('button',{style:{padding:18,borderRadius:12,border:'2px solid rgba(16,185,129,.3)',background:'rgba(16,185,129,.06)',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:6},onClick:()=>{
    const data={products:S.products,orders:S.orders,expenses:S.expenses,taxis:S.taxis,shipments:S.shipments,settings:S.settings,exportDate:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sonbola-backup-'+toDay()+'.json';a.click();
    lMsg.textContent='✅ تم تحميل ملف النسخة الاحتياطية!';lMsg.style.color='#10b981';
  }},el('span',{style:{fontSize:28}},'⬇️'),el('p',{style:{fontWeight:700,color:'#10b981',fontFamily:'Cairo,sans-serif',fontSize:13}},'تحميل JSON'),el('p',{style:{fontSize:11,color:'var(--muted-fg)',fontFamily:'Cairo,sans-serif'}},'حفظاً على الجهاز')));
  const fi=el('input',{type:'file',accept:'.json',style:{display:'none'}});
  fi.addEventListener('change',async e=>{
    const file=e.target.files?.[0];if(!file)return;e.target.value='';
    const r=new FileReader();
    r.onload=async ev=>{
      try{const dd=JSON.parse(ev.target.result);if(!confirm('هل تريد استيراد البيانات؟'))return;await sync(async()=>{if(dd.products?.length)await db.add('products',dd.products.map(p=>({name:p.name,category:p.category,season:p.season,buy_price:p.buy_price||p.buyPrice||0,sell_price:p.sell_price||p.sellPrice||0,stock:p.stock||0,min_stock:p.min_stock||1,image:p.img||p.image||null})));if(dd.expenses?.length)await db.add('expenses',dd.expenses.map(ex=>({category:ex.category,description:ex.description,amount:ex.amount,date:ex.expenseDate||ex.date,notes:ex.notes})));if(dd.orders?.length)await db.add('orders',dd.orders);});await loadAll();lMsg.textContent='✅ تم الاستيراد بنجاح!';lMsg.style.color='#10b981';}
      catch(err){lMsg.textContent='❌ ملف غير صالح: '+err.message;lMsg.style.color='#f87171';}
    };r.readAsText(file);
  });
  br.appendChild(el('label',{style:{padding:18,borderRadius:12,border:'2px solid rgba(251,146,60,.3)',background:'rgba(251,146,60,.05)',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:6}},el('span',{style:{fontSize:28}},'⬆️'),el('p',{style:{fontWeight:700,color:'#fb923c',fontFamily:'Cairo,sans-serif',fontSize:13}},'استيراد JSON'),el('p',{style:{fontSize:11,color:'var(--muted-fg)',fontFamily:'Cairo,sans-serif'}},'استعادة البيانات'),fi));
  lc.appendChild(br);lc.appendChild(lMsg);
  lc.appendChild(el('div',{style:{marginTop:8,padding:'9px 12px',borderRadius:8,background:'rgba(251,146,60,.07)',border:'1px solid rgba(251,146,60,.2)',color:'#ca8a04',fontSize:11}},'🔥 الاستيراد يُبدّل البيانات الموجودة ولا يحذفها — آمن للاستخدام في أي وقت.'));
  d.appendChild(lc);return d;
};

// أولاً: ارسم الواجهة فوراً (صفحة تسجيل الدخول أو شاشة التحميل)
try { render(); } catch(e) { console.error('render error:', e); }

// ثانياً: هيّئ Firebase وحمّل البيانات
initFirebase().then(ok=>{
  if(S.authed) loadAll();
  // إذا لم يكن مسجلاً — الـ render الأول كفى (عرض صفحة تسجيل الدخول)
}).catch(e=>{ console.error(e); if(S.loading) setState({loading:false}); });
</script>
