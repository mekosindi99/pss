<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>سنبلة | نظام إدارة المبيعات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Cairo',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;direction:rtl}
input,select,button,textarea{font-family:'Cairo',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spin{animation:spin 0.8s linear infinite}
.fi{animation:fi 0.2s ease}
.app{display:flex;min-height:100vh}
.sidebar{width:230px;background:linear-gradient(180deg,#0b1120,#0d1f18,#0b1120);border-left:1px solid rgba(255,255,255,0.05);height:100vh;position:sticky;top:0;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.content{flex:1;padding:16px;overflow-y:auto}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px;border:1px solid transparent;background:transparent;color:#94a3b8;margin-bottom:2px;text-align:right;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.nav-btn.active{border-color:var(--ac,rgba(52,211,153,0.28));background:var(--ab,rgba(52,211,153,0.14));color:var(--ac,#34d399)}
.nav-icon{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.active .nav-icon{background:var(--aib,rgba(52,211,153,0.22))}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.g-auto{grid-template-columns:repeat(auto-fit,minmax(270px,1fr))}
.card{background:rgba(30,41,59,0.9);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px}
.stat{background:rgba(30,41,59,0.9);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px}
.btn{padding:9px 18px;border-radius:10px;border:none;background:#10b981;color:#fff;font-size:13px;font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;vertical-align:middle}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-ghost{background:rgba(255,255,255,0.08);color:#94a3b8}
.btn-red{background:#ef4444}
.inp{width:100%;padding:9px 13px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);color:#e2e8f0;font-size:13px;font-family:'Cairo',sans-serif;outline:none;box-sizing:border-box}
.inp:focus{border-color:rgba(16,185,129,0.5)}
.lbl{display:block;font-size:12px;font-weight:700;color:#94a3b8;margin-bottom:5px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-green{background:rgba(16,185,129,0.15);color:#10b981}
.badge-red{background:rgba(239,68,68,0.15);color:#f87171}
.badge-blue{background:rgba(59,130,246,0.15);color:#60a5fa}
.badge-amber{background:rgba(245,158,11,0.15);color:#fbbf24}
.badge-purple{background:rgba(167,139,250,0.15);color:#a78bfa}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#1e293b;border:1px solid rgba(255,255,255,0.1);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;position:relative;z-index:101}
.modal-head{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:20px;overflow-y:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:9px 10px;text-align:right;font-weight:700;color:#64748b;font-size:11px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.08);white-space:nowrap}
.tbl td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,0.04)}
.tbl tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
.page{display:flex;flex-direction:column;gap:16px}
.ph{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.ph h1{font-size:24px;font-weight:900;color:#f1f5f9}
.sync-bar{padding:5px 10px;display:flex;align-items:center;gap:6px;font-size:11px}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.warn-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;color:#f87171}
.search-wrap{position:relative}
.search-wrap .icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#64748b;pointer-events:none}
.search-wrap .inp{padding-right:36px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-col{display:flex;flex-direction:column;gap:10px}
.summary-box{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px;background:rgba(16,185,129,0.08);border-radius:10px;margin-bottom:14px;font-size:13px}
.exp-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.12);border-radius:10px}
.taxi-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.12);border-radius:10px}
.ship-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:10px}
.season-card{border-radius:12px;padding:14px;border:1px solid transparent}
.danger-box{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:14px;padding:18px}
.mob-header{display:none;background:#0b1120;padding:10px 14px;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:50}
@media(max-width:768px){.sidebar{display:none!important}.mob-header{display:flex!important}.content{padding:12px}}
.mob-sidebar{position:fixed;right:0;top:0;bottom:0;width:240px;background:linear-gradient(180deg,#0b1120,#0d1f18,#0b1120);z-index:200;display:flex;flex-direction:column;overflow:hidden}
.mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:199}
.chart-bar{height:20px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;margin-top:4px}
.chart-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease}
@media print{.sidebar,.mob-header,.btn,.no-print{display:none!important}body{background:#fff!important;color:#000!important}.card,.stat{background:#fff!important;border:1px solid #ccc!important}}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════
const SB_URL="https://wluwwfgbzwfdxbxcnpyl.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsdXd3ZmdiendmZHhieGNucHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTczODYsImV4cCI6MjA5NTk3MzM4Nn0.2hEogDdSxKkOqKcU_5-1-PowdS_POAVnIPzmdTbxhuI";
const api=async(path,opts={})=>{
  const r=await fetch(SB_URL+"/rest/v1/"+path,{
    headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json",Prefer:opts.prefer||"return=representation",...(opts.headers||{})},
    ...opts
  });
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
};
const db={
  list:(t,q)=>api(t+"?"+(q||"")+"&order=created_at.asc"),
  add:(t,d)=>api(t,{method:"POST",body:JSON.stringify(d)}),
  set:(t,id,d)=>api(t+"?id=eq."+id,{method:"PATCH",body:JSON.stringify(d)}),
  del:(t,id)=>api(t+"?id=eq."+id,{method:"DELETE",prefer:"return=minimal"}),
  ups:(t,d)=>api(t,{method:"POST",body:JSON.stringify(d),headers:{Prefer:"resolution=merge-duplicates,return=representation"}}),
};

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const fmt=n=>Number(n||0).toLocaleString("en-US");
const toDay=()=>new Date().toISOString().split("T")[0];
const todayDisp=()=>new Date().toLocaleDateString("en-GB");
const getSeason=d=>{const m=new Date(d).getMonth()+1;return[12,1,2].includes(m)?"شتاء":[3,4,5].includes(m)?"ربيع":[6,7,8].includes(m)?"صيف":"خريف";};
const el=(tag,attrs,...kids)=>{
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")e.className=v;
    else if(k==="innerHTML")e.innerHTML=v;
    else if(k==="disabled")v?e.setAttribute("disabled",""):e.removeAttribute("disabled");
    else e.setAttribute(k,v);
  });
  kids.flat(Infinity).forEach(k=>{if(k!=null&&k!==false&&k!==undefined){e.appendChild(typeof k==="string"||typeof k==="number"?document.createTextNode(k):k);}});
  return e;
};
const txt=s=>document.createTextNode(s||"");

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const DEF_SETTINGS={
  delivery_zones:[
    {name:"زاخو",price:3000,cities:["زاخو"]},
    {name:"مناطق كردستان",price:5000,cities:["أربيل","السليمانية","حلبجة","دهوك","كركوك"]},
    {name:"المحافظات العراقية",price:5000,cities:["الأنبار (الرمادي)","القادسية (الديوانية)","المثنى (السماوة)","النجف","بابل (الحلة)","بصرة","بغداد","ديالى (بعقوبة)","ذي قار (الناصرية)","صلاح الدين (تكريت)","كربلاء","ميسان (العمارة)","نينوى (الموصل)","واسط (الكوت)"]},
    {name:"الأهل والبيت",price:0,cities:["الأهل والبيت"]},
  ],
  categories:["ملابس_أطفال"],
  expense_categories:["تخفيضات_البريد","تعبئة اشتراك خط اسيا","تعبئه_كارت_RT"],
  next_order_id:1,
};

let STATE={
  authed:!!localStorage.getItem("sb_auth"),
  page:"dashboard",
  loading:true,
  syncSt:"synced",
  dbErr:null,
  mobileOpen:false,
  lang:localStorage.getItem("sb_lang")||"ar",
  theme:"dark",
  products:[],orders:[],expenses:[],taxis:[],shipments:[],
  settings:JSON.parse(JSON.stringify(DEF_SETTINGS)),
};

// ═══════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════
let rendering=false;
const render=()=>{
  if(rendering)return;rendering=true;
  requestAnimationFrame(()=>{
    const root=document.getElementById("root");
    const newDom=buildApp();
    root.innerHTML="";root.appendChild(newDom);
    rendering=false;
  });
};
const setState=(patch)=>{Object.assign(STATE,typeof patch==="function"?patch(STATE):patch);render();};

// ═══════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════
const loadAll=async()=>{
  setState({loading:true,dbErr:null});
  try{
    const[p,o,e,tx,sh,st]=await Promise.all([
      db.list("products"),db.list("orders"),db.list("expenses"),
      db.list("taxi_rides"),db.list("shipments"),db.list("settings","id=eq.1"),
    ]);
    const settings=(st&&st.length)?st[0]:JSON.parse(JSON.stringify(DEF_SETTINGS));
    if(!st||!st.length)await db.ups("settings",{id:1,...DEF_SETTINGS});
    setState({products:p||[],orders:(o||[]).map(x=>({...x,items:x.items||[]})),expenses:e||[],taxis:tx||[],shipments:sh||[],settings,loading:false});
  }catch(err){setState({dbErr:err.message,loading:false});}
};

const sync=async(fn)=>{
  setState({syncSt:"saving"});
  try{await fn();setState({syncSt:"synced"});}
  catch(err){setState({syncSt:"error"});alert("خطأ: "+err.message);}
};

// ═══════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════
const Btn=(text,cls,onClick,disabled)=>{
  const b=el("button",{className:"btn "+(cls||""),onClick,disabled},...(Array.isArray(text)?text:[text]));
  return b;
};
const Inp=(attrs)=>el("input",{className:"inp",...attrs});
const Sel=(val,opts,onChange)=>el("select",{className:"inp",onChange},
  ...opts.map(([v,t])=>el("option",{value:v,...(v===val?{selected:"selected"}:{})},t||v))
);
const Label=(text)=>el("label",{className:"lbl"},text);
const StatCard=(label,value,icon,color)=>el("div",{className:"stat"},
  el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
    el("div",null,
      el("p",{style:{fontSize:11,color:"#64748b",marginBottom:4}},label),
      el("p",{style:{fontSize:22,fontWeight:800,color:color||"#e2e8f0"}},fmt(value))
    ),
    icon?el("span",{style:{fontSize:24,opacity:0.7}},icon):null
  )
);

const Modal=(title,body,onClose,maxW)=>{
  const ov=el("div",{className:"overlay",onClick:e=>{if(e.target===ov)onClose();}});
  const m=el("div",{className:"modal",style:{maxWidth:maxW||560}});
  m.onclick=e=>e.stopPropagation();
  const head=el("div",{className:"modal-head"},
    el("h3",{style:{margin:0,fontSize:16,fontWeight:700,color:"#f1f5f9"}},title),
    el("button",{style:{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer"},onClick:onClose},"✕")
  );
  const bdy=el("div",{className:"modal-body"},body);
  m.appendChild(head);m.appendChild(bdy);ov.appendChild(m);
  return ov;
};

// ═══════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════
const NAV=[
  {id:"dashboard",label:"لوحة التحكم",icon:"📊",color:"#38bdf8"},
  {id:"orders",label:"المبيعات",icon:"📋",color:"#34d399"},
  {id:"products",label:"المنتجات والمخزون",icon:"📦",color:"#a78bfa"},
  {id:"expenses",label:"المصروفات",icon:"🧾",color:"#fb923c"},
  {id:"taxi",label:"تكسي داخلي",icon:"🚕",color:"#fbbf24"},
  {id:"shipment",label:"وجبة (طيارة/سفينة)",icon:"🚢",color:"#22d3ee"},
  {id:"reports",label:"التقارير",icon:"📈",color:"#f472b6"},
  {id:"settings",label:"الإعدادات",icon:"⚙️",color:"#94a3b8"},
  {id:"backup",label:"النسخ الاحتياطي",icon:"💾",color:"#10b981"},
];

const buildSidebar=()=>{
  const {page,syncSt,lang,theme,products}=STATE;
  const lowStock=products.filter(p=>p.stock<=1).length;

  const logo=el("div",{style:{padding:"18px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0}},
    el("div",{style:{display:"flex",alignItems:"center",gap:10}},
      el("div",{style:{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}},"🌾"),
      el("div",null,
        el("p",{style:{fontWeight:800,fontSize:14,color:"#fff"}},"pos-sonbola"),
        el("p",{style:{fontSize:10,color:"rgba(52,211,153,0.6)"}},"نظام إدارة المبيعات")
      )
    )
  );

  const syncColor=syncSt==="error"?"#ef4444":syncSt==="saving"?"#fbbf24":"#10b981";
  const syncBg=syncSt==="error"?"rgba(239,68,68,0.1)":syncSt==="saving"?"rgba(251,191,36,0.1)":"rgba(16,185,129,0.07)";
  const syncTxt=syncSt==="error"?"خطأ في الحفظ":syncSt==="saving"?"جاري الحفظ...":"✓ محفوظ سحابياً";
  const syncBar=el("div",{className:"sync-bar",style:{background:syncBg}},
    el("div",{className:"sync-dot",style:{background:syncColor}}),
    el("span",{style:{color:syncColor,fontSize:11}},syncTxt)
  );

  const nav=el("nav",{style:{flex:1,padding:"8px",overflowY:"auto"}},
    ...NAV.map(item=>{
      const active=page===item.id;
      const b=el("button",{
        className:"nav-btn"+(active?" active":""),
        style:{"--ac":item.color,"--ab":item.color+"14","--aib":item.color+"22"},
        onClick:()=>setState({page:item.id,mobileOpen:false})
      },
        el("div",{className:"nav-icon"},item.icon),
        el("span",{style:{flex:1}},item.label),
        item.id==="products"&&lowStock>0?el("span",{style:{background:"#ef4444",color:"#fff",fontSize:10,borderRadius:10,padding:"1px 7px",fontWeight:700}},lowStock):null,
        active?el("div",{style:{width:7,height:7,borderRadius:"50%",background:item.color,flexShrink:0}}):null
      );
      return b;
    })
  );

  const bottom=el("div",{style:{padding:"10px",borderTop:"1px solid rgba(255,255,255,0.05)",flexShrink:0}},
    el("div",{style:{display:"flex",gap:5,marginBottom:8}},
      el("button",{className:"btn btn-sm",style:{flex:1,background:lang==="ar"?"linear-gradient(135deg,#10b981,#059669)":"rgba(255,255,255,0.05)",color:lang==="ar"?"#fff":"#64748b"},onClick:()=>{localStorage.setItem("sb_lang","ar");setState({lang:"ar"});}},"العربية 🇮🇶"),
      el("button",{className:"btn btn-sm",style:{flex:1,background:lang==="en"?"linear-gradient(135deg,#10b981,#059669)":"rgba(255,255,255,0.05)",color:lang==="en"?"#fff":"#64748b"},onClick:()=>{localStorage.setItem("sb_lang","en");setState({lang:"en"});}},"English"),
      el("button",{className:"btn btn-sm",style:{width:32,padding:"6px",background:"linear-gradient(135deg,#f59e0b,#d97706)"},onClick:()=>setState({theme:theme==="dark"?"light":"dark"})},theme==="dark"?"☀️":"🌙")
    ),
    el("button",{className:"btn btn-ghost",style:{width:"100%",justifyContent:"center"},onClick:()=>{localStorage.removeItem("sb_auth");setState({authed:false,page:"dashboard"});}},"🚪 تسجيل الخروج")
  );

  const s=el("div",{style:{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}},logo,syncBar,nav,bottom);
  return s;
};

// ═══════════════════════════════════════════
// LOGIN PAGE
// ═══════════════════════════════════════════
const buildLogin=()=>{
  let idV="",pwV="",showPw=false;
  const wrap=el("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"linear-gradient(135deg,#0f172a,#0c1f19,#0f172a)",position:"relative",overflow:"hidden"}});
  const glow=el("div",{style:{position:"absolute",top:0,right:"25%",width:380,height:380,borderRadius:"50%",background:"radial-gradient(circle,rgba(16,185,129,0.18) 0%,transparent 70%)",pointerEvents:"none"}});

  const idInp=Inp({placeholder:"admin",onInput:e=>idV=e.target.value});
  const pwInp=Inp({type:"password",placeholder:"••••••••",style:{paddingLeft:44},onInput:e=>pwV=e.target.value});
  const eyeBtn=el("button",{type:"button",style:{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#64748b",fontSize:16,cursor:"pointer"},onClick:()=>{showPw=!showPw;pwInp.setAttribute("type",showPw?"text":"password");eyeBtn.textContent=showPw?"🙈":"👁";}},"👁");
  const pwWrap=el("div",{style:{position:"relative"}},pwInp,eyeBtn);
  const errDiv=el("div",{style:{display:"none",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10,padding:"10px 14px",color:"#f87171",fontSize:13,textAlign:"center",marginBottom:16}});

  const submitBtn=el("button",{type:"submit",style:{width:"100%",padding:14,borderRadius:14,border:"none",background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"Cairo,sans-serif"}},"تسجيل الدخول");

  const form=el("form",{onSubmit:e=>{
    e.preventDefault();
    if(idV==="admin"&&pwV==="admin123"){localStorage.setItem("sb_auth","1");setState({authed:true});}
    else{errDiv.textContent="اسم المستخدم أو كلمة المرور غير صحيحة";errDiv.style.display="block";}
  }},
    el("div",{style:{marginBottom:16}},el("label",{style:{display:"block",fontSize:13,fontWeight:700,color:"#34d399",marginBottom:8}},"اسم المستخدم"),idInp),
    el("div",{style:{marginBottom:16}},el("label",{style:{display:"block",fontSize:13,fontWeight:700,color:"#34d399",marginBottom:8}},"كلمة المرور"),pwWrap),

  addZoneRow.appendChild(Btn("➕ إضافة","",async()=>{
    if(!newZN.trim())return;
    const zones=[...(settings.delivery_zones||[]),{name:newZN,price:Number(newZP||0),cities:[]}];
    await saveS({...STATE.settings,delivery_zones:zones});
  }));
  zonesCard.appendChild(addZoneRow);

  (settings.delivery_zones||[]).forEach((zone,zi)=>{
    const zoneDiv=el("div",{style:{marginBottom:14,border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,overflow:"hidden"}});
    const zHead=el("div",{style:{background:"rgba(255,255,255,0.04)",padding:"9px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}});
    zHead.appendChild(el("span",{style:{fontWeight:700,color:"#f1f5f9"}},zone.name));
    zHead.appendChild(el("div",{style:{display:"flex",gap:10,alignItems:"center"}},
      el("span",{style:{fontSize:11,color:"#64748b"}},zone.cities.length+" منطقة"),
      el("button",{style:{background:"none",border:"none",cursor:"pointer",fontSize:15},onClick:async()=>{
        if(!confirm("حذف هذه المنطقة؟"))return;
        const zones=(STATE.settings.delivery_zones||[]).filter((_,i)=>i!==zi);
        await saveS({...STATE.settings,delivery_zones:zones});
      }},"🗑️")
    ));
    zoneDiv.appendChild(zHead);
    const zBody=el("div",{style:{padding:10}});

    // Price
    const priceDiv=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",borderRadius:8,marginBottom:10,background:zone.price===0?"rgba(245,158,11,0.1)":"rgba(16,185,129,0.1)"}});
    priceDiv.appendChild(el("span",{style:{fontWeight:800,color:zone.price===0?"#f59e0b":"#10b981"}},zone.price===0?"🎁 مجاني":fmt(zone.price)+" د.ع"));
    priceDiv.appendChild(el("button",{style:{background:"none",border:"none",color:"#60a5fa",cursor:"pointer",fontSize:12},onClick:async()=>{
      const newPrice=prompt("سعر التوصيل الجديد:",zone.price);
      if(newPrice===null)return;
      const zones=[...(STATE.settings.delivery_zones||[])];zones[zi].price=Number(newPrice);
      await saveS({...STATE.settings,delivery_zones:zones});
    }},"✏️ تعديل السعر"));
    zBody.appendChild(priceDiv);

    // Add city
    const cityRow=el("div",{style:{display:"flex",gap:8,marginBottom:8}});
    const cityInp=Inp({placeholder:"إضافة محافظة...",style:{flex:1},onInput:e=>newCity=e.target.value});
    cityRow.appendChild(cityInp);
    cityRow.appendChild(Btn("➕","",async()=>{
      if(!cityInp.value.trim())return;
      const zones=[...(STATE.settings.delivery_zones||[])];zones[zi].cities=[...zones[zi].cities,cityInp.value.trim()];
      await saveS({...STATE.settings,delivery_zones:zones});
    }));
    zBody.appendChild(cityRow);

    // Cities
    const citiesGrid=el("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:5}});
    zone.cities.forEach((city,ci)=>{
      citiesGrid.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 9px",borderRadius:7,border:"1px solid rgba(255,255,255,0.06)",background:"rgba(255,255,255,0.03)",fontSize:12,color:"#e2e8f0"}},
        el("span",null,city),
        el("button",{style:{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:11},onClick:async()=>{
          const zones=[...(STATE.settings.delivery_zones||[])];zones[zi].cities.splice(ci,1);
          await saveS({...STATE.settings,delivery_zones:zones});
        }},"✕")
      ));
    });
    zBody.appendChild(citiesGrid);zoneDiv.appendChild(zBody);zonesCard.appendChild(zoneDiv);
  });
  div.appendChild(zonesCard);

  // Categories
  const catGrid=el("div",{className:"grid g-auto"});
  const buildCatCard=(title,key,val,setVal)=>{
    const c=el("div",{className:"card"});
    c.appendChild(el("p",{style:{fontWeight:700,fontSize:14,marginBottom:12,color:"#f1f5f9"}},title));
    const row=el("div",{style:{display:"flex",gap:8,marginBottom:10}});
    const cinp=Inp({placeholder:"اسم الفئة...",style:{flex:1},onInput:e=>setVal(e.target.value)});
    row.appendChild(cinp);
    row.appendChild(Btn("➕","",async()=>{
      if(!cinp.value.trim())return;
      const cats=[...(STATE.settings[key]||[]),cinp.value.trim()];
      await saveS({...STATE.settings,[key]:cats});
    }));
    c.appendChild(row);
    (settings[key]||[]).forEach((cat,i)=>{
      c.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,marginBottom:5,fontSize:12,color:"#e2e8f0"}},
        el("span",null,cat),
        el("button",{style:{background:"none",border:"none",cursor:"pointer",fontSize:13},onClick:async()=>{
          const cats=(STATE.settings[key]||[]).filter((_,idx)=>idx!==i);
          await saveS({...STATE.settings,[key]:cats});
        }},"🗑️")
      ));
    });
    return c;
  };
  catGrid.appendChild(buildCatCard("🏷️ فئات المنتجات","categories","",v=>newCat=v));
  catGrid.appendChild(buildCatCard("💵 فئات المصروفات","expense_categories","",v=>newExpCat=v));
  div.appendChild(catGrid);

  // Danger zone
  const danger=el("div",{className:"danger-box"});
  danger.appendChild(el("div",{style:{display:"flex",alignItems:"center",gap:8,color:"#f87171",marginBottom:8}},el("span",null,"⚠️"),el("span",{style:{fontWeight:800,fontSize:14}},"منطقة الخطر — تصفير البيانات")));
  danger.appendChild(el("p",{style:{fontSize:12,color:"#64748b",marginBottom:12}},"سيتم حذف جميع البيانات من قاعدة البيانات السحابية نهائياً."));
  danger.appendChild(Btn("🔄 تصفير جميع البيانات","btn-red",async()=>{
    if(!confirm("⚠️ سيتم حذف جميع البيانات نهائياً!"))return;
    await sync(async()=>{
      for(const t of["orders","expenses","taxi_rides","shipments","products"])
        await api(t+"?id=gte.0",{method:"DELETE",prefer:"return=minimal"});
    });
    window.location.reload();
  }));
  div.appendChild(danger);
  return div;
};

// ═══════════════════════════════════════════
// BACKUP
// ═══════════════════════════════════════════
const buildBackup=()=>{
  const {products,orders,expenses,taxis,shipments,settings}=STATE;
  const div=el("div",{className:"page",style:{maxWidth:580,margin:"0 auto"}});
  div.appendChild(el("h1",{style:{fontSize:24,fontWeight:900,color:"#f1f5f9"}},"💾 النسخ الاحتياطي"));

  // Cloud card
  const cloudCard=el("div",{style:{background:"linear-gradient(135deg,#1a73e8,#0f4c96)",borderRadius:18,padding:22,color:"#fff",marginBottom:16}});
  cloudCard.appendChild(el("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:14}},
    el("div",{style:{width:48,height:48,background:"rgba(255,255,255,0.2)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}},"☁️"),
    el("div",null,el("p",{style:{fontWeight:800,fontSize:16}},"Supabase Cloud"),el("p",{style:{fontSize:12,opacity:0.8}},"بياناتك محفوظة تلقائياً على السحابة"))
  ));
  const statsRow=el("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}});
  [["المنتجات",products.length],["الطلبات",orders.length],["المصروفات",expenses.length]].forEach(([l,v])=>{
    statsRow.appendChild(el("div",{style:{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"10px 12px",textAlign:"center"}},el("p",{style:{fontSize:22,fontWeight:900}},v),el("p",{style:{fontSize:11,opacity:0.75}},l)));
  });
  cloudCard.appendChild(statsRow);
  const msgP=el("p",{style:{textAlign:"center",fontSize:13,color:"rgba(255,255,255,0.8)",marginTop:8,minHeight:20}});
  cloudCard.appendChild(el("button",{style:{width:"100%",padding:11,background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:10,color:"#fff",cursor:"pointer",fontFamily:"Cairo,sans-serif",fontWeight:700,fontSize:13},onClick:async()=>{msgP.textContent="🔄 جاري التحديث...";await loadAll();msgP.textContent="✅ تم تحديث البيانات!";}},
    "🔄 تحديث البيانات من السحابة"));
  cloudCard.appendChild(msgP);div.appendChild(cloudCard);

  const localCard=el("div",{className:"card"});
  localCard.appendChild(el("p",{style:{fontWeight:700,fontSize:14,marginBottom:4,color:"#f1f5f9"}},"🖥️ نسخ احتياطي محلي (JSON)"));
  localCard.appendChild(el("p",{style:{fontSize:12,color:"#64748b",marginBottom:14}},"احفظ نسخة على جهازك أو استعد من نسخة سابقة."));
  const btnRow=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}});
  const localMsg=el("div",{style:{minHeight:20}});

  const exportBtn=el("button",{style:{padding:18,borderRadius:12,border:"2px solid rgba(16,185,129,0.3)",background:"rgba(16,185,129,0.05)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6,width:"100%"},onClick:()=>{
    const data={products:STATE.products,orders:STATE.orders,expenses:STATE.expenses,taxis:STATE.taxis,shipments:STATE.shipments,settings:STATE.settings,exportDate:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="pos-backup-"+toDay()+".json";a.click();
    localMsg.textContent="✅ تم تحميل ملف النسخة الاحتياطية!";localMsg.style.color="#10b981";
  }},el("span",{style:{fontSize:26}},"⬇️"),el("p",{style:{fontWeight:700,color:"#10b981",fontFamily:"Cairo,sans-serif",fontSize:13}},"تحميل JSON"),el("p",{style:{fontSize:11,color:"#64748b",fontFamily:"Cairo,sans-serif"}},"حفظ على الجهاز"));

  const fileInp=el("input",{type:"file",accept:".json",style:{display:"none"}});
  fileInp.addEventListener("change",async e=>{
    const file=e.target.files[0];if(!file)return;e.target.value="";
    const reader=new FileReader();
    reader.onload=async ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!confirm("هل تريد استيراد البيانات؟"))return;
        await sync(async()=>{
          if(d.products&&d.products.length)await db.add("products",d.products.map(p=>({name:p.name,category:p.category,season:p.season,buy_price:p.buy_price||p.buyPrice||0,sell_price:p.sell_price||p.sellPrice||0,stock:p.stock||0,added_date:p.added_date||todayDisp()})));
          if(d.expenses&&d.expenses.length)await db.add("expenses",d.expenses.map(ex=>({category:ex.category,description:ex.description,amount:ex.amount,date:ex.date,notes:ex.notes})));
        });
        await loadAll();localMsg.textContent="✅ تم الاستيراد بنجاح!";localMsg.style.color="#10b981";
      }catch(err){localMsg.textContent="❌ ملف غير صالح: "+err.message;localMsg.style.color="#f87171";}
    };
    reader.readAsText(file);
  });

  const importLbl=el("label",{style:{padding:18,borderRadius:12,border:"2px solid rgba(245,158,11,0.3)",background:"rgba(245,158,11,0.05)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6}},
    el("span",{style:{fontSize:26}},"⬆️"),el("p",{style:{fontWeight:700,color:"#f59e0b",fontFamily:"Cairo,sans-serif",fontSize:13}},"استيراد JSON"),el("p",{style:{fontSize:11,color:"#64748b",fontFamily:"Cairo,sans-serif"}},"استعادة البيانات"),fileInp);

  btnRow.appendChild(exportBtn);btnRow.appendChild(importLbl);
  localCard.appendChild(btnRow);localCard.appendChild(localMsg);
  div.appendChild(localCard);
  return div;
};

// ═══════════════════════════════════════════
// MAIN APP BUILDER
// ═══════════════════════════════════════════
const buildApp=()=>{
  const {authed,loading,dbErr,page,mobileOpen}=STATE;
  if(!authed)return buildLogin();

  const appDiv=el("div",{className:"app"});

  // Desktop sidebar
  const sidebarEl=el("aside",{className:"sidebar"});
  sidebarEl.appendChild(buildSidebar());
  appDiv.appendChild(sidebarEl);

  const mainDiv=el("div",{className:"main"});

  // Mobile header
  const mobHead=el("div",{className:"mob-header"});
  mobHead.appendChild(el("div",{style:{display:"flex",alignItems:"center",gap:8}},
    el("div",{style:{width:30,height:30,borderRadius:8,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}},"🌾"),
    el("span",{style:{fontWeight:800,color:"#fff",fontSize:14}},"pos-sonbola")
  ));
  mobHead.appendChild(el("button",{style:{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:18,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"},onClick:()=>setState({mobileOpen:true})},"☰"));
  mainDiv.appendChild(mobHead);

  // Mobile sidebar overlay
  if(mobileOpen){
    const mobOv=el("div",{className:"mob-overlay",onClick:()=>setState({mobileOpen:false})});
    const mobSide=el("div",{className:"mob-sidebar"});
    mobSide.appendChild(buildSidebar());
    document.body.appendChild(mobOv);document.body.appendChild(mobSide);
    setTimeout(()=>{
      const ov=document.querySelector(".mob-overlay");
      const ms=document.querySelector(".mob-sidebar");
      if(ov)ov.addEventListener("click",()=>{setState({mobileOpen:false});if(ov)ov.remove();if(ms)ms.remove();});
    },0);
  }

  if(dbErr){
    const errBar=el("div",{style:{background:"rgba(239,68,68,0.1)",borderBottom:"1px solid rgba(239,68,68,0.2)",padding:"10px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}});
    errBar.appendChild(el("span",{style:{color:"#f87171",fontSize:13}},"⚠️ "+dbErr));
    errBar.appendChild(Btn("إعادة المحاولة","btn-red btn-sm",loadAll));
    mainDiv.appendChild(errBar);
  }

  const content=el("div",{className:"content"});
  if(loading){
    content.appendChild(el("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:60,gap:12}},
      el("div",{className:"spin",style:{width:40,height:40,border:"3px solid rgba(255,255,255,0.1)",borderTopColor:"#10b981",borderRadius:"50%"}}),
      el("p",{style:{color:"#64748b",fontSize:13}},"جاري التحميل...")
    ));
  }else{
    const pageEl=el("div",{className:"fi"});
    const pages={dashboard:buildDashboard,orders:buildOrders,products:buildProducts,expenses:buildExpenses,taxi:buildTaxi,shipment:buildShipment,reports:buildReports,settings:buildSettings,backup:buildBackup};
    if(pages[page])pageEl.appendChild(pages[page]());
    content.appendChild(pageEl);
  }
  mainDiv.appendChild(content);
  appDiv.appendChild(mainDiv);
  return appDiv;
};

// ═══════════════════════════════════════════
// START
// ═══════════════════════════════════════════
render();
if(STATE.authed)loadAll();
</script>
</body>
